<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>The Nucleus | Physics Course Map</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES (Scientific Blue & Teal) --- */
        :root {
            --bg-deep: #0B1A2F;      /* Deep navy - represents the cosmos/depth */
            --bg-surface: #12263A;    /* Slightly lighter navy */
            --primary: #2A7F8F;       /* Teal - represents energy/light */
            --accent: #4ECDC4;         /* Light teal - represents electricity/plasma */
            --text-main: #FFFFFF;
            --text-muted: #9FC7D4;     /* Soft blue for muted text */
            --border: rgba(42, 127, 143, 0.25); /* Teal-tinted border */
            --card-hover: rgba(42, 127, 143, 0.15);
            --font: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'Inter', monospace;
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font);
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            font-size: 14px; /* Base font size for mobile */
        }

        a { text-decoration: none; color: inherit; }

        /* --- BACKGROUND EFFECTS (scaled down for mobile) --- */
        .glow-orb {
            position: fixed; 
            width: min(400px, 80vw); 
            height: min(400px, 80vw);
            background: var(--primary); 
            filter: blur(min(150px, 10vw)); 
            opacity: 0.12;
            border-radius: 50%; 
            z-index: -1; 
            pointer-events: none;
        }
        .glow-1 { top: -10vh; left: -10vw; }
        .glow-2 { bottom: -10vh; right: -10vw; background: var(--accent); opacity: 0.1; }

        /* Circuit Pattern Overlay (lighter on mobile) */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 30px 30px, var(--border) 1px, transparent 1px),
                linear-gradient(var(--border) 0.5px, transparent 0.5px),
                linear-gradient(90deg, var(--border) 0.5px, transparent 0.5px);
            background-size: 60px 60px, 30px 30px, 30px 30px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.1; /* Slightly lighter */
        }

        /* --- HEADER (more compact) --- */
        header {
            padding: 0.8rem 1rem;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(11, 26, 47, 0.9); 
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; 
            top: 0; 
            z-index: 50;
        }

        .brand { 
            font-size: 1.2rem; 
            font-weight: 800; 
            letter-spacing: -0.3px; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }
        .brand span { color: var(--accent); }
        .brand-icon { 
            width: 28px; 
            height: 28px; 
            background: var(--accent); 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1rem;
            color: var(--bg-deep); 
            font-weight: bold;
        }

        .user-pill {
            display: flex; 
            align-items: center; 
            gap: 6px;
            background: rgba(255,255,255,0.05); 
            padding: 4px 10px; 
            border-radius: 50px; 
            border: 1px solid var(--border);
            font-size: 0.8rem;
        }
        .user-avatar { 
            width: 24px; 
            height: 24px; 
            background: var(--accent); 
            border-radius: 50%; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            font-size:0.7rem; 
            font-weight:bold; 
            color:var(--bg-deep);
        }

        /* --- HERO SECTION (more compact) --- */
        .hero {
            padding: 1rem 1rem 0.5rem;
            text-align: center;
            max-width: 600px; 
            margin: 0 auto;
        }

        .hero h1 { 
            font-size: 1.8rem; 
            font-weight: 700; 
            margin-bottom: 0.3rem; 
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .hero-subtitle {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow-x: auto;
            padding-bottom: 0.3rem;
            -webkit-overflow-scrolling: touch;
        }

        .hero p { 
            color: var(--text-muted); 
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }

        /* --- GRID LAYOUT (optimized for mobile) --- */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columns on mobile */
            gap: 0.6rem;
            padding: 0 0.8rem 2rem 0.8rem;
            max-width: 600px; 
            margin: 0 auto;
        }

        /* --- MODULE CARD (smaller for mobile) --- */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.8rem;
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            aspect-ratio: 1 / 1;
            transition: transform 0.15s, background 0.15s, border-color 0.15s;
            cursor: pointer;
            position: relative; 
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-3px);
            background: linear-gradient(145deg, var(--bg-surface), var(--card-hover));
            border-color: var(--accent);
        }

        /* Card Visuals */
        .card-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 6px; 
        }
        .card-num { 
            font-size: 0.65rem; 
            color: var(--accent); 
            font-weight: 700; 
            opacity: 0.9;
            letter-spacing: 0.3px;
        }
        .card-icon { 
            font-size: 1.4rem; 
        }
        
        .card-title {
            font-size: 0.8rem; 
            font-weight: 700; 
            line-height: 1.2; 
            margin-bottom: auto;
            color: #E2E8F0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            margin-top: 6px;
            display: flex; 
            justify-content: flex-end;
        }
        
        .arrow-btn { 
            width: 22px; 
            height: 22px; 
            border-radius: 50%; 
            background: rgba(255,255,255,0.05); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-muted);
            font-size: 0.7rem;
            transition: all 0.15s;
        }
        .card:hover .arrow-btn { 
            background: var(--accent); 
            color: var(--bg-deep); 
        }

        /* Section Header (smaller for mobile) */
        .section-header {
            grid-column: 1 / -1;
            margin-top: 1.2rem;
            margin-bottom: 0.3rem;
            padding-left: 0.3rem;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.3px;
        }
        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            width: 60px;
            margin-top: 2px;
        }

        /* --- TABLET UP --- */
        @media (min-width: 480px) {
            body { font-size: 15px; }
            .module-grid { 
                grid-template-columns: repeat(3, 1fr); 
                gap: 0.8rem;
                padding: 0 1rem 2.5rem 1rem;
            }
            .card { padding: 1rem; }
            .card-title { font-size: 0.9rem; }
            .hero h1 { font-size: 2.2rem; }
        }

        @media (min-width: 768px) {
            body { font-size: 16px; }
            .module-grid { 
                grid-template-columns: repeat(4, 1fr); 
                max-width: 1200px;
                gap: 1rem;
                padding: 0 1.5rem 3rem 1.5rem;
            }
            .card { 
                padding: 1.2rem;
                aspect-ratio: 1.2 / 1;
            }
            .card-title { font-size: 1rem; }
            .card-icon { font-size: 1.8rem; }
            .hero { padding: 2rem; }
            .hero h1 { font-size: 3rem; }
            .hero-subtitle { 
                font-size: 1rem;
                white-space: normal;
                overflow-x: visible;
            }
        }

        @media (min-width: 1024px) {
            .module-grid { 
                grid-template-columns: repeat(5, 1fr); 
            }
        }

        /* Landscape mode optimization */
        @media (max-height: 500px) and (orientation: landscape) {
            .hero { padding: 0.5rem; }
            .hero h1 { font-size: 1.5rem; }
            .hero p { margin-bottom: 0.5rem; }
            .module-grid { 
                grid-template-columns: repeat(4, 1fr);
                gap: 0.5rem;
                padding-bottom: 1rem;
            }
            .card { aspect-ratio: 1.2 / 0.8; }
        }

        /* Touch-friendly adjustments */
        .card, .back-button, .user-pill {
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(78, 205, 196, 0.2);
        }

        /* Hide scrollbar for hero subtitle on mobile */
        .hero-subtitle::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Backgrounds -->
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
    <div class="pattern-overlay"></div>

    <!-- Header -->
    <header>
        <div class="brand">
            <div class="brand-icon">⚛️</div>
            <span>The</span> Nucleus
        </div>
        <div class="user-pill">
            <span>Scientist</span>
            <div class="user-avatar">P</div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="hero">
            <h1>Physics</h1>
            <div class="hero-subtitle">MEASUREMENT • MOTION • ENERGY • WAVES • FIELDS • MODERN PHYSICS</div>
         </div>

        <!-- The Grid -->
        <div class="module-grid" id="gridContainer">
            <!-- Cards injected via JS -->
        </div>
    </main>

<script>
        // === PHYSICS MODULES - Complete Syllabus (1-58) ===
const modules = [
    // Measurements and Units (1-4)
    { id: 1, folder: "1.Fundamental", title: "Fundamental & Derived Units", icon: "📏", section: "A" },
    { id: 2, folder: "2.Measuring_Instruments", title: "Measuring Instruments", icon: "🔬", section: "A" },
    { id: 3, folder: "3.Dimension", title: "Dimensions", icon: "📐", section: "A" },
    { id: 4, folder: "4.Limitations", title: "Limitations & Errors", icon: "⚠️", section: "A" },
    
    // Mechanics (5-24)
    { id: 5, folder: "5. Scalars and vectors", title: "Scalars & Vectors", icon: "➡️", section: "B" },
    { id: 6, folder: "6.position_and_displacement", title: "Position & Displacement", icon: "📍", section: "B" },
    { id: 7, folder: "7.Newton's_Law_of_motion", title: "Newton's Laws", icon: "⚖️", section: "B" },
    { id: 8, folder: "8.Types_of_motion", title: "Types of Motion", icon: "🔄", section: "B" },
    { id: 9, folder: "9.Linear_Motion", title: "Linear Motion", icon: "📈", section: "B" },
    { id: 10, folder: "10.Projectiles", title: "Projectiles", icon: "🎯", section: "B" },
    { id: 11, folder: "11.Gravitational_Field", title: "Gravitational Field", icon: "🌍", section: "B" },
    { id: 12, folder: "12.Equilibrium_of_Forces", title: "Equilibrium of Forces", icon: "⚖️", section: "B" },
    { id: 13, folder: "13.Principles_of_moments", title: "Principles of Moments", icon: "🔧", section: "B" },
    { id: 14, folder: "14.Centre_of_gravity_and_stability", title: "Centre of Gravity", icon: "📊", section: "B" },
    { id: 15, folder: "15.Friction", title: "Friction", icon: "🔥", section: "B" },
    { id: 16, folder: "16.Work_energy_and_power", title: "Work, Energy & Power", icon: "⚡", section: "B" },
    { id: 17, folder: "17.Energy_and_society", title: "Energy & Society", icon: "🏭", section: "B" },
    { id: 18, folder: "18.Dams_and_energy_production", title: "Dams & Energy", icon: "🌊", section: "B" },
    { id: 19, folder: "19.Nuclear_Energy", title: "Nuclear Energy", icon: "☢️", section: "B" },
    { id: 20, folder: "20.Solar_energy", title: "Solar Energy", icon: "☀️", section: "B" },
    { id: 21, folder: "21.Simple_machines", title: "Simple Machines", icon: "⚙️", section: "B" },
    { id: 22, folder: "22.Elasticity", title: "Elasticity", icon: "🪷", section: "B" },
    { id: 23, folder: "23.Pressure", title: "Pressure", icon: "📊", section: "B" },
    { id: 24, folder: "24.Liquids_at_Rest", title: "Liquids at Rest", icon: "💧", section: "B" },

    // Heat & Thermodynamics (25-32)
    { id: 25, folder: "25.Temperature_and_measurement", title: "Temperature", icon: "🌡️", section: "C" },
    { id: 26, folder: "26.Quantity_of_heat", title: "Quantity of Heat", icon: "🔥", section: "C" },
    { id: 27, folder: "27.Change_of_staate", title: "Change of State", icon: "💨", section: "C" }, // Note: folder name has typo "staate"
    { id: 28, folder: "28.Thermal_expansion", title: "Thermal Expansion", icon: "📈", section: "C" },
    { id: 29, folder: "29.Gas_laws", title: "Gas Laws", icon: "🧪", section: "C" },
    { id: 30, folder: "30.Vapours_and_humidity", title: "Vapours & Humidity", icon: "💧", section: "C" },
    { id: 31, folder: "31.Kinetic_theory_of_matter", title: "Kinetic Theory", icon: "⚛️", section: "C" },
    { id: 32, folder: "32.Heat_transfer", title: "Heat Transfer", icon: "🌡️", section: "C" },

    // Waves & Sound (33-37)
    { id: 33, folder: "33.Production_and_propagation_waves", title: "Wave Production", icon: "🌊", section: "D" },
    { id: 34, folder: "34.Classification_of_waves", title: "Wave Classification", icon: "📊", section: "D" },
    { id: 35, folder: "35.Characteristics_of_waves", title: "Wave Properties", icon: "🔄", section: "D" },
    { id: 36, folder: "36.Propagation_of_sound", title: "Sound Propagation", icon: "🔊", section: "D" },
    { id: 37, folder: "37.Characteristics_of_sound", title: "Sound Properties", icon: "🎵", section: "D" },

    // Light & Optics (38-42)
    { id: 38, folder: "38.Light_energy", title: "Light Energy", icon: "💡", section: "E" },
    { id: 39, folder: "39.Reflection_of_light", title: "Reflection", icon: "🪞", section: "E" },
    { id: 40, folder: "40.Refraction_of_light", title: "Refraction", icon: "🔍", section: "E" },
    { id: 41, folder: "41.Optical_instruments", title: "Optical Instruments", icon: "🔭", section: "E" },
    { id: 42, folder: "42.Dispersion_and_colours", title: "Dispersion", icon: "🌈", section: "E" },

    // Electricity & Magnetism (43-53)
    { id: 43, folder: "43.Electrostatics", title: "Electrostatics", icon: "⚡", section: "F" },
    { id: 44, folder: "44.Capacitors", title: "Capacitors", icon: "🔋", section: "F" },
    { id: 45, folder: "45.Electric_cells", title: "Electric Cells", icon: "🔋", section: "F" },
    { id: 46, folder: "46.Current_electricity", title: "Current Electricity", icon: "⚡", section: "F" },
    { id: 47, folder: "47.Electrical_energy_and_power", title: "Electrical Energy", icon: "💡", section: "F" },
    { id: 48, folder: "48.magnets_and+magnetic_fields", title: "Magnets & Fields", icon: "🧲", section: "F" }, // Note the plus sign
    { id: 49, folder: "49.Force_on_current_carrying_conductor", title: "Force on Conductor", icon: "⚡", section: "F" },
    { id: 50, folder: "50.Electromagnetic_induction", title: "EM Induction", icon: "🔄", section: "F" },
    { id: 51, folder: "51.Inductance", title: "Inductance", icon: "⏲️", section: "F" },
    { id: 52, folder: "52.Eddy_current", title: "Eddy Current", icon: "🔄", section: "F" },
    { id: 53, folder: "53.Simple_AC_Circuits", title: "AC Circuits", icon: "📈", section: "F" },

    // Modern Physics & Electronics (54-58)
    { id: 54, folder: "54.Conduction_through_liquids", title: "Conduction in Liquids", icon: "💧", section: "G" },
    { id: 55, folder: "55.Conduction_through_gases", title: "Conduction in Gases", icon: "💨", section: "G" },
    { id: 56, folder: "56.Elementary_modern_physics", title: "Modern Physics", icon: "⚛️", section: "G" },
    { id: 57, folder: "57.Introductory_electronics", title: "Electronics", icon: "📻", section: "G" },
    { id: 58, folder: "58.Fibre_optics_and_lasers", title: "Fibre Optics", icon: "💫", section: "G" }
];
        // Section titles
        const sections = {
            'A': 'Measurements',
            'B': 'Mechanics',
            'C': 'Heat',
            'D': 'Waves',
            'E': 'Optics',
            'F': 'Electricity',
            'G': 'Modern Physics & Electronics'
        };

        const grid = document.getElementById('gridContainer');

        // Render all modules
        function renderModules() {
            let html = '';
            
            // Render sections in order
            ['A', 'B', 'C', 'D', 'E', 'F', 'G'].forEach(sectionCode => {
                const sectionModules = modules.filter(m => m.section === sectionCode);
                
                if (sectionModules.length > 0) {
                    // Section header
                    html += `
                        <div class="section-header">
                            <div class="section-title">${sections[sectionCode]}</div>
                            <div class="section-divider"></div>
                        </div>
                    `;
                    
                    // Module cards
                    sectionModules.forEach(module => {
                        // CORRECTED PATH: Use the exact folder name as it appears in your file system
                        const modulePath = `${module.folder}/index.html`;
                        
                        html += `
                            <a href="${modulePath}" class="card">
                                <div class="card-top">
                                    <span class="card-num">${module.id.toString().padStart(2, '0')}</span>
                                    <span class="card-icon">${module.icon}</span>
                                </div>
                                <div class="card-title">${module.title}</div>
                                <div class="card-footer">
                                    <div class="arrow-btn">➜</div>
                                </div>
                            </a>
                        `;
                    });
                }
            });

            grid.innerHTML = html;
        }

        // Initial render
        renderModules();
    </script>

</body>
</html>
