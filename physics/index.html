<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Nucleus | Physics Course Map</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES (Scientific Blue & Teal) --- */
        :root {
            --bg-deep: #0B1A2F;      /* Deep navy - represents the cosmos/depth */
            --bg-surface: #12263A;    /* Slightly lighter navy */
            --primary: #2A7F8F;       /* Teal - represents energy/light */
            --accent: #4ECDC4;         /* Light teal - represents electricity/plasma */
            --text-main: #FFFFFF;
            --text-muted: #9FC7D4;     /* Soft blue for muted text */
            --border: rgba(42, 127, 143, 0.25); /* Teal-tinted border */
            --card-hover: rgba(42, 127, 143, 0.15);
            --font: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'Inter', monospace;
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font);
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        /* --- BACKGROUND EFFECTS --- */
        .glow-orb {
            position: fixed; width: 400px; height: 400px;
            background: var(--primary); filter: blur(150px); opacity: 0.12;
            border-radius: 50%; z-index: -1; pointer-events: none;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; background: var(--accent); opacity: 0.1; }

        /* Circuit Pattern Overlay */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 30px 30px, var(--border) 1px, transparent 1px),
                linear-gradient(var(--border) 0.5px, transparent 0.5px),
                linear-gradient(90deg, var(--border) 0.5px, transparent 0.5px);
            background-size: 60px 60px, 30px 30px, 30px 30px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.15;
        }

        /* --- HEADER --- */
        header {
            padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(11, 26, 47, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }

        .brand { 
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; 
        }
        .brand span { color: var(--accent); }
        .brand-icon { 
            width: 32px; height: 32px; background: var(--accent); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            color: var(--bg-deep); font-weight: bold;
        }

        .user-pill {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 50px; border: 1px solid var(--border);
        }
        .user-avatar { 
            width: 28px; height: 28px; background: var(--accent); border-radius: 50%; 
            display:flex; align-items:center; justify-content:center; font-size:0.8rem; 
            font-weight:bold; color:var(--bg-deep);
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 2rem;
            text-align: center;
            max-width: 800px; margin: 0 auto;
        }

        .hero h1 { 
            font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; 
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-family: var(--font-mono);
            font-size: 1rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .hero p { color: var(--text-muted); margin-bottom: 2rem; }

        /* --- GRID LAYOUT --- */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            padding: 0 1.5rem 4rem 1.5rem;
            max-width: 1200px; margin: 0 auto;
        }

        /* --- MODULE CARD --- */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.2rem;
            display: flex; flex-direction: column; justify-content: space-between;
            aspect-ratio: 1 / 1.1;
            transition: transform 0.2s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
            position: relative; overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            background: linear-gradient(145deg, var(--bg-surface), var(--card-hover));
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Card Visuals */
        .card-top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
        .card-num { 
            font-size: 0.75rem; 
            color: var(--accent); 
            font-weight: 700; 
            opacity: 0.9;
            letter-spacing: 0.5px;
        }
        .card-icon { font-size: 1.8rem; }
        
        .card-title {
            font-size: 1rem; font-weight: 700; line-height: 1.3; margin-bottom: auto;
            color: #E2E8F0;
        }

        .card-footer {
            margin-top: 10px;
            display: flex; justify-content: flex-end;
        }
        
        .arrow-btn { 
            width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: center; color: var(--text-muted);
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .card:hover .arrow-btn { background: var(--accent); color: var(--bg-deep); }

        /* Section Header */
        .section-header {
            grid-column: 1 / -1;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
        }
        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            width: 100px;
            margin-top: 4px;
        }

        /* --- RESPONSIVE --- */
        @media (min-width: 768px) {
            .module-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
            .card { aspect-ratio: 1.5 / 1; }
            .hero h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <!-- Backgrounds -->
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
    <div class="pattern-overlay"></div>

    <!-- Header -->
    <header>
        <div class="brand">
            <div class="brand-icon">⚛️</div>
            <span>The</span> Nucleus
        </div>
        <div class="user-pill">
            <span style="font-size:0.8rem; color:var(--text-muted);">Scientist</span>
            <div class="user-avatar">P</div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="hero">
            <h1>Physics</h1>
            <div class="hero-subtitle">58 MODULES • COMPLETE SYLLABUS • JAMB • WAEC • NECO</div>
            <p>Master the fundamental laws of the universe with our comprehensive physics course.</p>
        </div>

        <!-- The Grid -->
        <div class="module-grid" id="gridContainer">
            <!-- Cards injected via JS -->
        </div>
    </main>

    <script>
        // === PHYSICS MODULES - Complete Syllabus (1-58) ===
        const modules = [
            // Measurements and Units (1-4)
            { id: 1, folder: "1. Fundamental", title: "Fundamental & Derived Units", icon: "📏", section: "A" },
            { id: 2, folder: "2. Measuring Instruments", title: "Measuring Instruments", icon: "🔬", section: "A" },
            { id: 3, folder: "3. Dimension", title: "Dimensions", icon: "📐", section: "A" },
            { id: 4, folder: "4. Limitations", title: "Limitations & Errors", icon: "⚠️", section: "A" },
            
            // Mechanics (5-24)
            { id: 5, folder: "5. Scalars and vectors", title: "Scalars & Vectors", icon: "➡️", section: "B" },
            { id: 6, folder: "6. Position and displacement", title: "Position & Displacement", icon: "📍", section: "B" },
            { id: 7, folder: "7. Newton's Law of motion", title: "Newton's Laws of Motion", icon: "⚖️", section: "B" },
            { id: 8, folder: "8. Types of motion", title: "Types of Motion", icon: "🔄", section: "B" },
            { id: 9, folder: "9. Linear Motion", title: "Linear Motion", icon: "📈", section: "B" },
            { id: 10, folder: "10. Projectiles", title: "Projectiles", icon: "🎯", section: "B" },
            { id: 11, folder: "11. Gravitational Field", title: "Gravitational Field", icon: "🌍", section: "B" },
            { id: 12, folder: "12. Equilibrium of Forces", title: "Equilibrium of Forces", icon: "⚖️", section: "B" },
            { id: 13, folder: "13. Principles of moments", title: "Principles of Moments", icon: "🔧", section: "B" },
            { id: 14, folder: "14. Centre of gravity and stability", title: "Centre of Gravity & Stability", icon: "📊", section: "B" },
            { id: 15, folder: "15. Friction", title: "Friction", icon: "🔥", section: "B" },
            { id: 16, folder: "16. Work, energy and power", title: "Work, Energy & Power", icon: "⚡", section: "B" },
            { id: 17, folder: "17. Energy and society", title: "Energy & Society", icon: "🏭", section: "B" },
            { id: 18, folder: "18. Dams and energy production", title: "Dams & Energy Production", icon: "🌊", section: "B" },
            { id: 19, folder: "19. Nuclear Energy", title: "Nuclear Energy", icon: "☢️", section: "B" },
            { id: 20, folder: "20. Solar energy", title: "Solar Energy", icon: "☀️", section: "B" },
            { id: 21, folder: "21. Simple machines", title: "Simple Machines", icon: "⚙️", section: "B" },
            { id: 22, folder: "22. Elasticity", title: "Elasticity", icon: "🪷", section: "B" },
            { id: 23, folder: "23. Pressure", title: "Pressure", icon: "📊", section: "B" },
            { id: 24, folder: "24. Liquids at Rest", title: "Liquids at Rest", icon: "💧", section: "B" },

            // Heat & Thermodynamics (25-32)
            { id: 25, folder: "25. Temperature and measurement", title: "Temperature & Measurement", icon: "🌡️", section: "C" },
            { id: 26, folder: "26. Quantity of heat", title: "Quantity of Heat", icon: "🔥", section: "C" },
            { id: 27, folder: "27. Change of state", title: "Change of State", icon: "💨", section: "C" },
            { id: 28, folder: "28. Thermal expansion", title: "Thermal Expansion", icon: "📈", section: "C" },
            { id: 29, folder: "29. Gas laws", title: "Gas Laws", icon: "🧪", section: "C" },
            { id: 30, folder: "30. Vapours and humidity", title: "Vapours & Humidity", icon: "💧", section: "C" },
            { id: 31, folder: "31. Kinetic theory of matter", title: "Kinetic Theory of Matter", icon: "⚛️", section: "C" },
            { id: 32, folder: "32. Heat transfer", title: "Heat Transfer", icon: "🌡️", section: "C" },

            // Waves & Sound (33-37)
            { id: 33, folder: "33. Production and propagation waves", title: "Production & Propagation of Waves", icon: "🌊", section: "D" },
            { id: 34, folder: "34. Classification of waves", title: "Classification of Waves", icon: "📊", section: "D" },
            { id: 35, folder: "35. Characteristics of waves", title: "Characteristics of Waves", icon: "🔄", section: "D" },
            { id: 36, folder: "36. Propagation of sound", title: "Propagation of Sound", icon: "🔊", section: "D" },
            { id: 37, folder: "37. Characteristics of sound", title: "Characteristics of Sound", icon: "🎵", section: "D" },

            // Light & Optics (38-42)
            { id: 38, folder: "38. Light energy", title: "Light Energy", icon: "💡", section: "E" },
            { id: 39, folder: "39. Reflection of light", title: "Reflection of Light", icon: "🪞", section: "E" },
            { id: 40, folder: "40. Refraction of light", title: "Refraction of Light", icon: "🔍", section: "E" },
            { id: 41, folder: "41. Optical instruments", title: "Optical Instruments", icon: "🔭", section: "E" },
            { id: 42, folder: "42. Dispersion and colours", title: "Dispersion & Colours", icon: "🌈", section: "E" },

            // Electricity & Magnetism (43-53)
            { id: 43, folder: "43. Electrostatics", title: "Electrostatics", icon: "⚡", section: "F" },
            { id: 44, folder: "44. Capacitors", title: "Capacitors", icon: "🔋", section: "F" },
            { id: 45, folder: "45. Electric cells", title: "Electric Cells", icon: "🔋", section: "F" },
            { id: 46, folder: "46. Current electricity", title: "Current Electricity", icon: "⚡", section: "F" },
            { id: 47, folder: "47. Electrical energy and power", title: "Electrical Energy & Power", icon: "💡", section: "F" },
            { id: 48, folder: "48. Magnets and magnetic fields", title: "Magnets & Magnetic Fields", icon: "🧲", section: "F" },
            { id: 49, folder: "49. Force on current carrying conductor", title: "Force on Current-Carrying Conductor", icon: "⚡", section: "F" },
            { id: 50, folder: "50. Electromagnetic induction", title: "Electromagnetic Induction", icon: "🔄", section: "F" },
            { id: 51, folder: "51. Inductance", title: "Inductance", icon: "⏲️", section: "F" },
            { id: 52, folder: "52. Eddy current", title: "Eddy Current", icon: "🔄", section: "F" },
            { id: 53, folder: "53. Simple AC Circuits", title: "Simple A.C Circuits", icon: "📈", section: "F" },

            // Modern Physics & Electronics (54-58)
            { id: 54, folder: "54. Conduction through liquids", title: "Conduction Through Liquids", icon: "💧", section: "G" },
            { id: 55, folder: "55. Conduction through gases", title: "Conduction Through Gases", icon: "💨", section: "G" },
            { id: 56, folder: "56. Elementary modern physics", title: "Elementary Modern Physics", icon: "⚛️", section: "G" },
            { id: 57, folder: "57. Introductory electronics", title: "Introductory Electronics", icon: "📻", section: "G" },
            { id: 58, folder: "58. Fibre optics and lasers", title: "Fibre Optics & Lasers", icon: "💫", section: "G" }
        ];

        // Section titles
        const sections = {
            'A': 'Measurements & Units',
            'B': 'Mechanics',
            'C': 'Heat & Thermodynamics',
            'D': 'Waves & Sound',
            'E': 'Light & Optics',
            'F': 'Electricity & Magnetism',
            'G': 'Modern Physics & Electronics'
        };

        const grid = document.getElementById('gridContainer');

        // Render all modules
        function renderModules() {
            let html = '';
            
            // Render sections in order
            ['A', 'B', 'C', 'D', 'E', 'F', 'G'].forEach(sectionCode => {
                const sectionModules = modules.filter(m => m.section === sectionCode);
                
                if (sectionModules.length > 0) {
                    // Section header
                    html += `
                        <div class="section-header">
                            <div class="section-title">${sections[sectionCode]}</div>
                            <div class="section-divider"></div>
                        </div>
                    `;
                    
                    // Module cards
                    sectionModules.forEach(module => {
                        // Create path based on folder structure
                        const modulePath = `physics/${module.folder}/index.html`;
                        
                        html += `
                            <a href="${modulePath}" class="card">
                                <div class="card-top">
                                    <span class="card-num">${module.id.toString().padStart(2, '0')}</span>
                                    <span class="card-icon">${module.icon}</span>
                                </div>
                                <div class="card-title">${module.title}</div>
                                <div class="card-footer">
                                    <div class="arrow-btn">➜</div>
                                </div>
                            </a>
                        `;
                    });
                }
            });

            grid.innerHTML = html;
        }

        // Initial render
        renderModules();
    </script>
</body>
</html>
