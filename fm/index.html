<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financial Management | ICAN Professional Level</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES (Professional Dark Mode) --- */
        :root {
            --bg-deep: #0B1423;      /* Very dark navy - serious, professional */
            --bg-surface: #1A2332;    /* Slightly lighter - boardroom dark */
            --primary: #2A5C8F;       /* Professional blue - trust/authority */
            --accent: #C5A572;         /* Muted gold - understated elegance */
            --text-main: #E9EDF2;
            --text-muted: #8F9BB3;     /* Muted blue-grey for secondary text */
            --border: rgba(42, 92, 143, 0.2); /* Subtle border */
            --card-hover: rgba(42, 92, 143, 0.1);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-serif: 'Source Serif Pro', Georgia, serif;
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
            font-weight: 400;
        }

        a { text-decoration: none; color: inherit; }

        /* --- BACKGROUND EFFECTS (More subtle) --- */
        .glow-orb {
            position: fixed; width: 400px; height: 400px;
            background: var(--primary); filter: blur(150px); opacity: 0.08;
            border-radius: 50%; z-index: -1; pointer-events: none;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; background: var(--accent); opacity: 0.05; }

        /* Subtle grid - barely visible */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border) 0.5px, transparent 0.5px),
                linear-gradient(90deg, var(--border) 0.5px, transparent 0.5px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.15;
        }

        /* --- HEADER (More refined) --- */
        header {
            padding: 1.25rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(11, 20, 35, 0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }

        .brand { 
            font-size: 1.25rem; 
            font-weight: 500; 
            letter-spacing: 0.5px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-transform: uppercase;
            color: var(--text-main);
        }
        .brand span { 
            color: var(--accent); 
            font-weight: 600;
        }
        .brand-icon { 
            width: 32px; 
            height: 32px; 
            background: transparent; 
            border: 1.5px solid var(--accent);
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1rem;
            color: var(--accent); 
            font-weight: 500;
        }

        .user-pill {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.02); padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .user-avatar { 
            width: 28px; height: 28px; background: var(--primary); border-radius: 4px; 
            display:flex; align-items:center; justify-content:center; font-size:0.75rem; 
            font-weight:600; color: white; text-transform: uppercase;
        }

        /* --- HERO SECTION (Cleaner, more professional) --- */
        .hero {
            padding: 2.5rem 2rem 1.5rem;
            text-align: center;
            max-width: 900px; margin: 0 auto;
        }

        .hero h1 { 
            font-size: 2.2rem; 
            font-weight: 600; 
            margin-bottom: 0.25rem; 
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(197, 165, 114, 0.1);
            border: 1px solid rgba(197, 165, 114, 0.2);
            color: var(--accent);
            font-size: 0.75rem;
            padding: 0.25rem 1rem;
            border-radius: 20px;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .hero-subtitle {
            font-family: var(--font-serif);
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-style: italic;
        }

        .hero p { 
            color: var(--text-muted); 
            font-size: 0.95rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- GRID LAYOUT (More spacious) --- */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.25rem;
            padding: 1.5rem 2rem 4rem 2rem;
            max-width: 1400px; margin: 0 auto;
        }

        /* --- MODULE CARD (Refined, less playful) --- */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px; /* Less rounded, more professional */
            padding: 1.5rem 1.25rem;
            display: flex; flex-direction: column;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative; overflow: hidden;
        }

        .card:hover {
            transform: translateY(-2px);
            background: var(--card-hover);
            border-color: var(--accent);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Card Visuals */
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .card-num { 
            font-size: 0.7rem; 
            color: var(--text-muted); 
            font-weight: 500; 
            letter-spacing: 0.5px;
            font-feature-settings: 'tnum';
        }
        .card-icon { 
            font-size: 1.4rem; 
            opacity: 0.8;
            color: var(--accent);
        }
        
        .card-title {
            font-size: 0.95rem; 
            font-weight: 600; 
            line-height: 1.4; 
            margin-bottom: 1.5rem;
            color: var(--text-main);
            flex-grow: 1;
        }

        .card-footer {
            display: flex; justify-content: flex-end; align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 0.75rem;
            margin-top: auto;
        }
        
        .arrow-btn { 
            width: 28px; height: 28px; border-radius: 4px; background: transparent; 
            display: flex; align-items: center; justify-content: center; color: var(--text-muted);
            font-size: 0.9rem;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        .card:hover .arrow-btn { 
            background: var(--accent); 
            color: var(--bg-deep); 
            border-color: var(--accent);
        }

        /* Section Header (More professional) */
        .section-header {
            grid-column: 1 / -1;
            margin-top: 1.5rem;
            margin-bottom: 0.25rem;
            padding-left: 0;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            width: 60px;
            margin-top: 6px;
        }

        /* --- RESPONSIVE --- */
        @media (min-width: 768px) {
            .module-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }
            .card { min-height: 180px; }
            .hero h1 { font-size: 2.8rem; }
        }

        /* --- FOOTER (Subtle exam reference) --- */
        .exam-footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            max-width: 1200px;
            margin: 0 auto 2rem;
            width: 90%;
        }

        .exam-footer span {
            color: var(--accent);
            font-weight: 500;
        }

    </style>
</head>
<body>

    <!-- Backgrounds (More subtle) -->
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
    <div class="pattern-overlay"></div>

    <!-- Header -->
    <header>
        <div class="brand">
            <div class="brand-icon">FM</div>
            <span>Financial</span> Management
        </div>
        <div class="user-pill">
            <span style="color:var(--text-muted);">Candidate</span>
            <div class="user-avatar">IC</div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="hero">
            <div class="hero-badge">Skills Level</div>
            <h1>Financial Management</h1>
            <div class="hero-subtitle">Investment decisions • Financing strategies • Risk management</div>
            <p>Complete syllabus coverage for the ICAN Professional examination</p>
        </div>

        <!-- The Grid -->
        <div class="module-grid" id="gridContainer">
            <!-- Cards injected via JS -->
        </div>

        <!-- Subtle footer with exam reference -->
        <div class="exam-footer">
            <span>FINANCIAL MANAGEMENT</span> • ICAN Skills Level • Syllabus aligned
        </div>
    </main>

    <script>
        // === 1. DATA CONFIGURATION ===
        // Financial Management Syllabus mapped to folders
        const modules = [
            // SECTION A: FINANCIAL MANAGEMENT FUNCTION AND ENVIRONMENT
            { id: 1, section: "A", folder: "01_NaturePurpose", title: "Nature & Purpose of Financial Management", icon: "⌛" },
            { id: 2, section: "A", folder: "02_CorporateObjectives", title: "Corporate Objectives & Stakeholders", icon: "⚖️" },
            { id: 3, section: "A", folder: "03_NotForProfit", title: "Not-for-Profit Organisations", icon: "🏛️" },
            { id: 4, section: "A", folder: "04_EconomicEnvironment", title: "Economic Environment of Business", icon: "📊" },
            { id: 5, section: "A", folder: "05_FinancialMarkets", title: "Financial Markets & Institutions", icon: "🏦" },
            
            // SECTION B: WORKING CAPITAL MANAGEMENT
            { id: 6, section: "B", folder: "06_NatureWorkingCapital", title: "Nature & Importance of Working Capital", icon: "🔄" },
            { id: 7, section: "B", folder: "07_InventoryManagement", title: "Management of Inventories", icon: "📦" },
            { id: 8, section: "B", folder: "08_ReceivablesManagement", title: "Management of Accounts Receivable", icon: "📋" },
            { id: 9, section: "B", folder: "09_PayablesManagement", title: "Management of Accounts Payable", icon: "💰" },
            { id: 10, section: "B", folder: "10_CashManagement", title: "Management of Cash", icon: "💵" },
            { id: 11, section: "B", folder: "11_WorkingCapitalNeeds", title: "Determining Working Capital Needs", icon: "📐" },
            
            // SECTION C: INVESTMENT APPRAISAL
            { id: 12, section: "C", folder: "12_AppraisalMethods", title: "Investment Appraisal Methods", icon: "📈" },
            { id: 13, section: "C", folder: "13_InflationTaxation", title: "Inflation & Taxation in DCF", icon: "📉" },
            { id: 14, section: "C", folder: "14_RiskUncertainty", title: "Risk & Uncertainty in Appraisal", icon: "⚠️" },
            { id: 15, section: "C", folder: "15_SpecificInvestments", title: "Specific Investment Decisions", icon: "🔍" },
            
            // SECTION D: BUSINESS FINANCE
            { id: 16, section: "D", folder: "16_SourcesFinance", title: "Sources of Finance", icon: "💳" },
            { id: 17, section: "D", folder: "17_CostCapital", title: "Cost of Capital", icon: "📊" },
            { id: 18, section: "D", folder: "18_RelativeCosts", title: "Sources of Finance & Relative Costs", icon: "⚖️" },
            { id: 19, section: "D", folder: "19_CapitalStructure", title: "Capital Structure Theories", icon: "🏗️" },
            { id: 20, section: "D", folder: "20_SMEs", title: "Finance for SMEs", icon: "🏢" },
            
            // SECTION E: BUSINESS VALUATIONS
            { id: 21, section: "E", folder: "21_NatureValuation", title: "Nature & Purpose of Valuation", icon: "💎" },
            { id: 22, section: "E", folder: "22_ValuationBases", title: "Choice of Assets Valuation Bases", icon: "📏" },
            { id: 23, section: "E", folder: "23_ValuationDebt", title: "Valuation of Debt & Financial Assets", icon: "📜" },
            { id: 24, section: "E", folder: "24_EMH", title: "Efficient Market Hypothesis", icon: "📈" },
            
            // SECTION F: RISK MANAGEMENT
            { id: 25, section: "F", folder: "25_NatureRisk", title: "Nature & Types of Risk", icon: "🎲" },
            { id: 26, section: "F", folder: "26_ExchangeRates", title: "Causes of Exchange Rate Differences", icon: "💱" },
            { id: 27, section: "F", folder: "27_HedgingCurrency", title: "Hedging Techniques for Currency Risk", icon: "🛡️" },
            { id: 28, section: "F", folder: "28_HedgingInterest", title: "Hedging Techniques for Interest Rate Risk", icon: "📉" }
        ];

        const grid = document.getElementById('gridContainer');

        // === 2. RENDER FUNCTION WITH SECTION HEADERS ===
        function renderModules() {
            grid.innerHTML = '';
            
            // Group by section
            const sections = {
                'A': 'A: Financial Management Function & Environment',
                'B': 'B: Working Capital Management',
                'C': 'C: Investment Appraisal',
                'D': 'D: Business Finance',
                'E': 'E: Business Valuations',
                'F': 'F: Risk Management'
            };
            
            // For each section, add header and cards
            ['A', 'B', 'C', 'D', 'E', 'F'].forEach(sectionCode => {
                const sectionModules = modules.filter(m => m.section === sectionCode);
                
                if (sectionModules.length > 0) {
                    // Add section header
                    const headerDiv = document.createElement('div');
                    headerDiv.className = 'section-header';
                    headerDiv.innerHTML = `
                        <div class="section-title">${sections[sectionCode]}</div>
                        <div class="section-divider"></div>
                    `;
                    grid.appendChild(headerDiv);
                    
                    // Add cards for this section - NO PROGRESS INDICATORS
                    sectionModules.forEach(mod => {
                        const link = `./${mod.folder}/index.html`;

                        const card = document.createElement('a');
                        card.href = link;
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-top">
                                <span class="card-num">${mod.id.toString().padStart(2, '0')}</span>
                                <span class="card-icon">${mod.icon}</span>
                            </div>
                            <div class="card-title">${mod.title}</div>
                            <div class="card-footer">
                                <div class="arrow-btn">→</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            });
        }

        // Initial Load
        renderModules();

    </script>
</body>
</html>
