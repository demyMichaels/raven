<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Ledger | Financial Management Course Map</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES (Finance Deep Indigo & Gold) --- */
        :root {
            --bg-deep: #0F1A2F;      /* Deep indigo - represents stability/trust */
            --bg-surface: #1A253F;    /* Slightly lighter indigo */
            --primary: #2A4B7C;       /* Medium blue - represents professionalism */
            --accent: #D4AF37;         /* Gold - represents wealth/value */
            --text-main: #FFFFFF;
            --text-muted: #B0C4DE;     /* Soft blue for muted text */
            --border: rgba(42, 75, 124, 0.3); /* Blue-tinted border */
            --card-hover: rgba(42, 75, 124, 0.2);
            --font: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'Source Code Pro', monospace;
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font);
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        /* --- BACKGROUND EFFECTS --- */
        .glow-orb {
            position: fixed; width: 400px; height: 400px;
            background: var(--primary); filter: blur(150px); opacity: 0.15;
            border-radius: 50%; z-index: -1; pointer-events: none;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; background: var(--accent); opacity: 0.1; }

        /* Grid Pattern Overlay (subtle - represents spreadsheets/financial data) */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border) 0.5px, transparent 0.5px),
                linear-gradient(90deg, var(--border) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.1;
        }

        /* --- HEADER --- */
        header {
            padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 26, 47, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }

        .brand { 
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; 
        }
        .brand span { color: var(--accent); }
        .brand-icon { 
            width: 32px; height: 32px; background: var(--accent); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            color: var(--bg-deep); font-weight: bold;
        }

        .user-pill {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 50px; border: 1px solid var(--border);
        }
        .user-avatar { 
            width: 28px; height: 28px; background: var(--accent); border-radius: 50%; 
            display:flex; align-items:center; justify-content:center; font-size:0.8rem; 
            font-weight:bold; color:var(--bg-deep);
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 2rem;
            text-align: center;
            max-width: 800px; margin: 0 auto;
        }

        .hero h1 { 
            font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; 
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-family: var(--font-mono);
            font-size: 1rem;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .hero p { color: var(--text-muted); margin-bottom: 2rem; }

        /* --- GRID LAYOUT --- */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            padding: 0 1.5rem 4rem 1.5rem;
            max-width: 1200px; margin: 0 auto;
        }

        /* --- MODULE CARD --- */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.2rem;
            display: flex; flex-direction: column; justify-content: space-between;
            aspect-ratio: 1 / 1.1;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
            cursor: pointer;
            position: relative; overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            background: linear-gradient(145deg, var(--bg-surface), var(--card-hover));
            border-color: var(--accent);
        }

        /* Card Visuals */
        .card-top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
        .card-num { 
            font-size: 0.75rem; 
            color: var(--accent); 
            font-weight: 700; 
            opacity: 0.9;
            letter-spacing: 0.5px;
        }
        .card-icon { font-size: 1.8rem; }
        
        .card-title {
            font-size: 1rem; font-weight: 700; line-height: 1.3; margin-bottom: auto;
            color: #E2E8F0;
        }

        .card-footer {
            margin-top: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-dot { 
            width: 8px; height: 8px; border-radius: 50%; 
            background: var(--bg-deep); 
            border: 1px solid var(--border); 
        }
        .status-dot.done { 
            background: var(--accent); 
            border-color: var(--accent); 
            box-shadow: 0 0 8px var(--accent); 
        }
        
        .arrow-btn { 
            width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: center; color: var(--text-muted);
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .card:hover .arrow-btn { background: var(--accent); color: var(--bg-deep); }

        /* Section Header */
        .section-header {
            grid-column: 1 / -1;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
        }
        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            width: 100px;
            margin-top: 4px;
        }

        /* --- RESPONSIVE --- */
        @media (min-width: 768px) {
            .module-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }
            .card { aspect-ratio: 1.5 / 1; }
            .hero h1 { font-size: 3rem; }
        }

    </style>
</head>
<body>

    <!-- Backgrounds -->
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
    <div class="pattern-overlay"></div>

    <!-- Header -->
    <header>
        <div class="brand">
            <div class="brand-icon">💰</div>
            <span>The</span> Ledger
        </div>
        <div class="user-pill">
            <span style="font-size:0.8rem; color:var(--text-muted);">Analyst</span>
            <div class="user-avatar">FM</div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="hero">
            <h1>Financial Management</h1>
            <div class="hero-subtitle">VALUE • INVESTMENT • FINANCE • RISK</div>
            <p>Master financial strategy, investment appraisal, and risk management for professional success.</p>
        </div>

        <!-- The Grid -->
        <div class="module-grid" id="gridContainer">
            <!-- Cards injected via JS -->
        </div>
    </main>

    <script>
        // === 1. DATA CONFIGURATION ===
        // Financial Management Syllabus mapped to folders
        const modules = [
            // SECTION A: FINANCIAL MANAGEMENT FUNCTION AND ENVIRONMENT
            { id: 1, section: "A", folder: "01_NaturePurpose", title: "Nature & Purpose of Financial Management", icon: "🎯" },
            { id: 2, section: "A", folder: "02_CorporateObjectives", title: "Corporate Objectives & Stakeholders", icon: "👥" },
            { id: 3, section: "A", folder: "03_NotForProfit", title: "Not-for-Profit Organisations", icon: "🏛️" },
            { id: 4, section: "A", folder: "04_EconomicEnvironment", title: "Economic Environment of Business", icon: "📊" },
            { id: 5, section: "A", folder: "05_FinancialMarkets", title: "Financial Markets & Institutions", icon: "🏦" },
            
            // SECTION B: WORKING CAPITAL MANAGEMENT
            { id: 6, section: "B", folder: "06_NatureWorkingCapital", title: "Nature & Importance of Working Capital", icon: "🔄" },
            { id: 7, section: "B", folder: "07_InventoryManagement", title: "Management of Inventories", icon: "📦" },
            { id: 8, section: "B", folder: "08_ReceivablesManagement", title: "Management of Accounts Receivable", icon: "📋" },
            { id: 9, section: "B", folder: "09_PayablesManagement", title: "Management of Accounts Payable", icon: "💰" },
            { id: 10, section: "B", folder: "10_CashManagement", title: "Management of Cash", icon: "💵" },
            { id: 11, section: "B", folder: "11_WorkingCapitalNeeds", title: "Determining Working Capital Needs", icon: "📐" },
            
            // SECTION C: INVESTMENT APPRAISAL
            { id: 12, section: "C", folder: "12_AppraisalMethods", title: "Investment Appraisal Methods", icon: "📈" },
            { id: 13, section: "C", folder: "13_InflationTaxation", title: "Inflation & Taxation in DCF", icon: "📉" },
            { id: 14, section: "C", folder: "14_RiskUncertainty", title: "Risk & Uncertainty in Appraisal", icon: "⚠️" },
            { id: 15, section: "C", folder: "15_SpecificInvestments", title: "Specific Investment Decisions", icon: "🔍" },
            
            // SECTION D: BUSINESS FINANCE
            { id: 16, section: "D", folder: "16_SourcesFinance", title: "Sources of Finance", icon: "💳" },
            { id: 17, section: "D", folder: "17_CostCapital", title: "Cost of Capital", icon: "📊" },
            { id: 18, section: "D", folder: "18_RelativeCosts", title: "Sources of Finance & Relative Costs", icon: "⚖️" },
            { id: 19, section: "D", folder: "19_CapitalStructure", title: "Capital Structure Theories", icon: "🏗️" },
            { id: 20, section: "D", folder: "20_SMEs", title: "Finance for SMEs", icon: "🏢" },
            
            // SECTION E: BUSINESS VALUATIONS
            { id: 21, section: "E", folder: "21_NatureValuation", title: "Nature & Purpose of Valuation", icon: "💎" },
            { id: 22, section: "E", folder: "22_ValuationBases", title: "Choice of Assets Valuation Bases", icon: "📏" },
            { id: 23, section: "E", folder: "23_ValuationDebt", title: "Valuation of Debt & Financial Assets", icon: "📜" },
            { id: 24, section: "E", folder: "24_EMH", title: "Efficient Market Hypothesis", icon: "📈" },
            
            // SECTION F: RISK MANAGEMENT
            { id: 25, section: "F", folder: "25_NatureRisk", title: "Nature & Types of Risk", icon: "🎲" },
            { id: 26, section: "F", folder: "26_ExchangeRates", title: "Causes of Exchange Rate Differences", icon: "💱" },
            { id: 27, section: "F", folder: "27_HedgingCurrency", title: "Hedging Techniques for Currency Risk", icon: "🛡️" },
            { id: 28, section: "F", folder: "28_HedgingInterest", title: "Hedging Techniques for Interest Rate Risk", icon: "📉" }
        ];

        const grid = document.getElementById('gridContainer');

        // === 2. RENDER FUNCTION WITH SECTION HEADERS ===
        function renderModules() {
            grid.innerHTML = '';
            
            // Group by section
            const sections = {
                'A': 'A: Financial Management Function & Environment',
                'B': 'B: Working Capital Management',
                'C': 'C: Investment Appraisal',
                'D': 'D: Business Finance',
                'E': 'E: Business Valuations',
                'F': 'F: Risk Management'
            };
            
            // For each section, add header and cards
            ['A', 'B', 'C', 'D', 'E', 'F'].forEach(sectionCode => {
                const sectionModules = modules.filter(m => m.section === sectionCode);
                
                if (sectionModules.length > 0) {
                    // Add section header
                    const headerDiv = document.createElement('div');
                    headerDiv.className = 'section-header';
                    headerDiv.innerHTML = `
                        <div class="section-title">${sections[sectionCode]}</div>
                        <div class="section-divider"></div>
                    `;
                    grid.appendChild(headerDiv);
                    
                    // Add cards for this section
                    sectionModules.forEach(mod => {
                        const link = `./${mod.folder}/index.html`;
                        
                        // Random progress for demo - in real app, this would come from user data
                        const isCompleted = [1, 5, 6, 10, 12, 16, 17, 21, 25, 27].includes(mod.id); 
                        const dotClass = isCompleted ? 'status-dot done' : 'status-dot';

                        const card = document.createElement('a');
                        card.href = link;
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-top">
                                <span class="card-num">${mod.id.toString().padStart(2, '0')}</span>
                                <span class="card-icon">${mod.icon}</span>
                            </div>
                            <div class="card-title">${mod.title}</div>
                            <div class="card-footer">
                                <div class="${dotClass}"></div>
                                <div class="arrow-btn">➜</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            });
        }

        // Initial Load
        renderModules();

    </script>
</body>
</html>
