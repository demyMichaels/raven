<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Quill | Literature-in-English Course Map</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES (Literature Deep Burgundy & Gold) --- */
        :root {
            --bg-deep: #2C1A1A;      /* Deep burgundy - represents passion/depth */
            --bg-surface: #3A2424;    /* Slightly lighter burgundy */
            --primary: #8B3A3A;       /* Medium red - represents emotion/ink */
            --accent: #D4AF37;         /* Gold - represents literary excellence */
            --text-main: #FFFFFF;
            --text-muted: #D4B8B8;     /* Soft rose for muted text */
            --border: rgba(139, 58, 58, 0.3); /* Red-tinted border */
            --card-hover: rgba(139, 58, 58, 0.2);
            --font: 'Plus Jakarta Sans', sans-serif;
            --font-serif: 'Cormorant Garamond', serif;
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font);
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        /* --- BACKGROUND EFFECTS --- */
        .glow-orb {
            position: fixed; width: 400px; height: 400px;
            background: var(--primary); filter: blur(150px); opacity: 0.15;
            border-radius: 50%; z-index: -1; pointer-events: none;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; background: var(--accent); opacity: 0.1; }

        /* Manuscript Pattern Overlay (subtle - represents text/lines) */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 19px, var(--border) 20px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 40px);
            background-size: 40px 20px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.1;
        }

        /* --- HEADER --- */
        header {
            padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(44, 26, 26, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }

        .brand { 
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; 
        }
        .brand span { color: var(--accent); }
        .brand-icon { 
            width: 32px; height: 32px; background: var(--accent); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            color: var(--bg-deep); font-weight: bold;
        }

        .user-pill {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 50px; border: 1px solid var(--border);
        }
        .user-avatar { 
            width: 28px; height: 28px; background: var(--accent); border-radius: 50%; 
            display:flex; align-items:center; justify-content:center; font-size:0.8rem; 
            font-weight:bold; color:var(--bg-deep);
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 2rem;
            text-align: center;
            max-width: 800px; margin: 0 auto;
        }

        .hero h1 { 
            font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; 
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            font-style: italic;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .hero p { color: var(--text-muted); margin-bottom: 2rem; }

        /* --- GRID LAYOUT --- */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            padding: 0 1.5rem 4rem 1.5rem;
            max-width: 1200px; margin: 0 auto;
        }

        /* --- MODULE CARD --- */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.2rem;
            display: flex; flex-direction: column; justify-content: space-between;
            aspect-ratio: 1 / 1.1;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
            cursor: pointer;
            position: relative; overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            background: linear-gradient(145deg, var(--bg-surface), var(--card-hover));
            border-color: var(--accent);
        }

        /* Card Visuals */
        .card-top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
        .card-num { 
            font-size: 0.75rem; 
            color: var(--accent); 
            font-weight: 700; 
            opacity: 0.9;
            letter-spacing: 0.5px;
        }
        .card-icon { font-size: 1.8rem; }
        
        .card-title {
            font-size: 1rem; font-weight: 700; line-height: 1.3; margin-bottom: auto;
            color: #E2E8F0;
        }

        .card-footer {
            margin-top: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-dot { 
            width: 8px; height: 8px; border-radius: 50%; 
            background: var(--bg-deep); 
            border: 1px solid var(--border); 
        }
        .status-dot.done { 
            background: var(--accent); 
            border-color: var(--accent); 
            box-shadow: 0 0 8px var(--accent); 
        }
        
        .arrow-btn { 
            width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: center; color: var(--text-muted);
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .card:hover .arrow-btn { background: var(--accent); color: var(--bg-deep); }

        /* Section Header */
        .section-header {
            grid-column: 1 / -1;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
        }
        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            width: 100px;
            margin-top: 4px;
        }

        /* --- RESPONSIVE --- */
        @media (min-width: 768px) {
            .module-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }
            .card { aspect-ratio: 1.5 / 1; }
            .hero h1 { font-size: 3rem; }
            .hero-subtitle { font-size: 1.8rem; }
        }

    </style>
</head>
<body>

    <!-- Backgrounds -->
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
    <div class="pattern-overlay"></div>

    <!-- Header -->
    <header>
        <div class="brand">
            <div class="brand-icon">✒️</div>
            <span>The</span> Quill
        </div>
        <div class="user-pill">
            <span style="font-size:0.8rem; color:var(--text-muted);">Reader</span>
            <div class="user-avatar">L</div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="hero">
            <h1>Literature-in-English</h1>
            <div class="hero-subtitle">Drama • Prose • Poetry</div>
            <p>Master literary analysis, genres, and prescribed texts for JAMB success.</p>
        </div>

        <!-- The Grid -->
        <div class="module-grid" id="gridContainer">
            <!-- Cards injected via JS -->
        </div>
    </main>

    <script>
        // === 1. DATA CONFIGURATION ===
        // Literature-in-English Syllabus mapped to folders
        const modules = [
            // LITERARY PRINCIPLES
            { id: 1, section: "A", folder: "01_DramaTypes", title: "Drama: Types", icon: "🎭" },
            { id: 2, section: "A", folder: "02_DramaticTechniques", title: "Dramatic Techniques", icon: "🎬" },
            { id: 3, section: "A", folder: "03_DramaInterpretation", title: "Interpretation of Drama", icon: "📖" },
            
            { id: 4, section: "A", folder: "04_ProseTypes", title: "Prose: Types", icon: "📚" },
            { id: 5, section: "A", folder: "05_NarrativeTechniques", title: "Narrative Techniques", icon: "✍️" },
            { id: 6, section: "A", folder: "06_ProseAnalysis", title: "Textual Analysis (Prose)", icon: "🔍" },
            
            { id: 7, section: "A", folder: "07_PoetryTypes", title: "Poetry: Types", icon: "📜" },
            { id: 8, section: "A", folder: "08_PoeticDevices", title: "Poetic Devices", icon: "🎨" },
            { id: 9, section: "A", folder: "09_PoetryAppreciation", title: "Poetry Appreciation", icon: "🌟" },
            
            { id: 10, section: "A", folder: "10_LiteraryTerms", title: "General Literary Terms", icon: "📋" },
            { id: 11, section: "A", folder: "11_LiteraryAppreciation", title: "Literary Appreciation", icon: "🧠" },
            
            // PRESCRIBED TEXTS - DRAMA
            { id: 12, section: "B", folder: "12_Drama_African", title: "African Drama: Marriage of Anansewa", icon: "🎭" },
            { id: 13, section: "B", folder: "13_Drama_NonAfrican", title: "Non-African Drama: Anthony & Cleopatra", icon: "🎭" },
            
            // PRESCRIBED TEXTS - PROSE
            { id: 14, section: "C", folder: "14_Prose_African1", title: "African Prose: So the Path Does Not Die", icon: "📘" },
            { id: 15, section: "C", folder: "15_Prose_African2", title: "African Prose: Redemption Road", icon: "📘" },
            { id: 16, section: "C", folder: "16_Prose_NonAfrican", title: "Non-African Prose: Path of Lucas", icon: "📗" },
            
            // PRESCRIBED TEXTS - POETRY (AFRICAN)
            { id: 17, section: "D", folder: "17_Poetry_Okara", title: "Poetry: Once Upon a Time (Okara)", icon: "📝" },
            { id: 18, section: "D", folder: "18_Poetry_Kamara", title: "Poetry: New Tongue (Kamara)", icon: "📝" },
            { id: 19, section: "D", folder: "19_Poetry_Soyinka", title: "Poetry: Night (Soyinka)", icon: "📝" },
            { id: 20, section: "D", folder: "20_Poetry_Osundare", title: "Poetry: Not my Business (Osundare)", icon: "📝" },
            { id: 21, section: "D", folder: "21_Poetry_AfriyieVidza", title: "Poetry: Hearty Garlands (Afriyie-Vidza)", icon: "📝" },
            { id: 22, section: "D", folder: "22_Poetry_CheneyCoker", title: "Poetry: The Breast of the Sea (Cheney-Coker)", icon: "📝" },
            
            // PRESCRIBED TEXTS - POETRY (NON-AFRICAN)
            { id: 23, section: "E", folder: "23_Poetry_Byron", title: "Poetry: She Walks in Beauty (Byron)", icon: "📜" },
            { id: 24, section: "E", folder: "24_Poetry_Chaucer", title: "Poetry: The Nun's Priest Tale (Chaucer)", icon: "📜" },
            { id: 25, section: "E", folder: "25_Poetry_Adcock", title: "Poetry: The Telephone Call (Adcock)", icon: "📜" },
            { id: 26, section: "E", folder: "26_Poetry_Gipson", title: "Poetry: The Stone (Gipson)", icon: "📜" }
        ];

        const grid = document.getElementById('gridContainer');

        // === 2. RENDER FUNCTION WITH SECTION HEADERS ===
        function renderModules() {
            grid.innerHTML = '';
            
            // Group by section
            const sections = {
                'A': 'Literary Principles & Terms',
                'B': 'Prescribed Drama Texts',
                'C': 'Prescribed Prose Texts',
                'D': 'Prescribed African Poetry',
                'E': 'Prescribed Non-African Poetry'
            };
            
            // For each section, add header and cards
            ['A', 'B', 'C', 'D', 'E'].forEach(sectionCode => {
                const sectionModules = modules.filter(m => m.section === sectionCode);
                
                if (sectionModules.length > 0) {
                    // Add section header
                    const headerDiv = document.createElement('div');
                    headerDiv.className = 'section-header';
                    headerDiv.innerHTML = `
                        <div class="section-title">${sections[sectionCode]}</div>
                        <div class="section-divider"></div>
                    `;
                    grid.appendChild(headerDiv);
                    
                    // Add cards for this section
                    sectionModules.forEach(mod => {
                        const link = `./${mod.folder}/index.html`;
                        
                        // Random progress for demo - in real app, this would come from user data
                        const isCompleted = [1, 2, 4, 7, 10, 11, 12, 14, 17, 19, 23].includes(mod.id); 
                        const dotClass = isCompleted ? 'status-dot done' : 'status-dot';

                        const card = document.createElement('a');
                        card.href = link;
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-top">
                                <span class="card-num">${mod.id.toString().padStart(2, '0')}</span>
                                <span class="card-icon">${mod.icon}</span>
                            </div>
                            <div class="card-title">${mod.title}</div>
                            <div class="card-footer">
                                <div class="${dotClass}"></div>
                                <div class="arrow-btn">➜</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            });
        }

        // Initial Load
        renderModules();

    </script>
</body>
</html>
