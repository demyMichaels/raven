<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Huda | IRS Course Map</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES (Islamic Green & Gold) --- */
        :root {
            --bg-deep: #0A1F0A;      /* Deep forest green */
            --bg-surface: #0F2A0F;    /* Slightly lighter green */
            --primary: #2E7D32;       /* Islamic green */
            --accent: #D4AF37;         /* Gold - symbolic of divine light/knowledge */
            --text-main: #FFFFFF;
            --text-muted: #A5D6A5;     /* Soft green for muted text */
            --border: rgba(46, 125, 50, 0.25); /* Green-tinted border */
            --card-hover: rgba(46, 125, 50, 0.2);
            --font: 'Plus Jakarta Sans', sans-serif;
            --font-arabic: 'Amiri', serif;
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font);
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        /* --- BACKGROUND EFFECTS --- */
        .glow-orb {
            position: fixed; width: 400px; height: 400px;
            background: var(--primary); filter: blur(150px); opacity: 0.15;
            border-radius: 50%; z-index: -1; pointer-events: none;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; background: var(--accent); opacity: 0.1; }

        /* Islamic Pattern Overlay (subtle) */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.03"><path d="M50 5 L95 50 L50 95 L5 50 Z" fill="none" stroke="%23D4AF37" stroke-width="0.5"/><circle cx="50" cy="50" r="20" fill="none" stroke="%23D4AF37" stroke-width="0.5"/></svg>');
            background-size: 100px 100px;
            pointer-events: none;
            z-index: -1;
        }

        /* --- HEADER --- */
        header {
            padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 31, 10, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }

        .brand { 
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; 
        }
        .brand span { color: var(--accent); }
        .brand-icon { 
            width: 32px; height: 32px; background: var(--accent); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
            color: var(--bg-deep); font-weight: bold;
        }

        .user-pill {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 50px; border: 1px solid var(--border);
        }
        .user-avatar { 
            width: 28px; height: 28px; background: var(--accent); border-radius: 50%; 
            display:flex; align-items:center; justify-content:center; font-size:0.8rem; 
            font-weight:bold; color:var(--bg-deep);
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 2rem;
            text-align: center;
            max-width: 800px; margin: 0 auto;
        }

        .bismillah {
            font-family: var(--font-arabic);
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }

        .hero h1 { 
            font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; 
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p { color: var(--text-muted); margin-bottom: 2rem; }

        /* --- GRID LAYOUT --- */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 0 1.5rem 4rem 1.5rem;
            max-width: 1200px; margin: 0 auto;
        }

        /* --- MODULE CARD --- */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex; flex-direction: column;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative; overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            background: linear-gradient(145deg, var(--bg-surface), var(--card-hover));
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Card Visuals */
        .card-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 1rem;
        }
        .card-num { 
            font-size: 0.9rem; 
            color: var(--accent); 
            font-weight: 700; 
            background: rgba(212, 175, 55, 0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            border: 1px solid var(--accent);
        }
        .card-icon { 
            font-size: 2.5rem; 
            background: rgba(255,255,255,0.05);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
        }
        
        .card-title {
            font-size: 1.2rem; 
            font-weight: 700; 
            line-height: 1.4; 
            margin-bottom: 0.75rem;
            color: #E2E8F0;
        }

        .subfolder-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .subfolder-count {
            background: rgba(212, 175, 55, 0.15);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .card-footer {
            margin-top: auto;
            display: flex; 
            justify-content: flex-end; 
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        
        .arrow-btn { 
            width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: center; color: var(--text-muted);
            font-size: 1rem;
            transition: all 0.2s;
        }
        .card:hover .arrow-btn { background: var(--accent); color: var(--bg-deep); }

        /* Section Header */
        .section-header {
            grid-column: 1 / -1;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
        }
        .section-divider {
            height: 3px;
            background: linear-gradient(90deg, var(--accent), transparent);
            width: 150px;
            margin-top: 0.5rem;
        }

        /* Arabic text */
        .arabic-small {
            font-family: var(--font-arabic);
            font-size: 0.8rem;
            color: var(--accent);
            opacity: 0.7;
        }

        /* --- RESPONSIVE --- */
        @media (min-width: 768px) {
            .module-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
            .hero h1 { font-size: 3rem; }
            .bismillah { font-size: 2.2rem; }
        }

    </style>
</head>
<body>

    <!-- Backgrounds -->
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
    <div class="pattern-overlay"></div>

    <!-- Header -->
    <header>
        <div class="brand">
            <div class="brand-icon">﷽</div>
            <span>Al</span>-Huda
        </div>
        <div class="user-pill">
            <span style="font-size:0.8rem; color:var(--text-muted);">Talib</span>
            <div class="user-avatar">ط</div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="hero">
            <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَـٰنِ الرَّحِيمِ</div>
            <h1>Islamic Religious Studies</h1>
            <p>Complete curriculum covering Qur'an, Hadith, Tawhid, Fiqh, and Islamic Civilization.</p>
        </div>

        <!-- The Grid -->
        <div class="module-grid" id="gridContainer">
            <!-- Cards injected via JS -->
        </div>
    </main>

    <script>
        // === 1. DATA CONFIGURATION ===
        // 20 main modules based on original syllabus
        const modules = [
            // PART I: REVELATION & QUR'AN (Modules 01-07)
            { 
                id: 1, 
                section: "1", 
                folder: "01_Revelation_Preservation", 
                title: "Revelation & Preservation of Qur'an", 
                icon: "📖", 
                subfolderCount: 4
            },
            { 
                id: 2, 
                section: "1", 
                folder: "02_Tafsir", 
                title: "Tafsir (Exegesis)", 
                icon: "📚", 
                subfolderCount: 0
            },
            { 
                id: 3, 
                section: "1", 
                folder: "03_Tajwid", 
                title: "Introduction to Tajwid", 
                icon: "🎵", 
                subfolderCount: 0
            },
            { 
                id: 4, 
                section: "1", 
                folder: "04_Surah_Study_1", 
                title: "Surah Study 1 (Fatihah - Nas)", 
                icon: "📖", 
                subfolderCount: 14
            },
            { 
                id: 5, 
                section: "1", 
                folder: "05_Surah_Study_2", 
                title: "Surah Study 2 (Ala - Bayyinah)", 
                icon: "📖", 
                subfolderCount: 11
            },
            { 
                id: 6, 
                section: "1", 
                folder: "06_Hadith", 
                title: "Hadith Literature & Authentication", 
                icon: "📜", 
                subfolderCount: 6
            },
            { 
                id: 7, 
                section: "1", 
                folder: "07_Moral_Lessons", 
                title: "Moral Lessons in Qur'an & Hadith", 
                icon: "⭐", 
                subfolderCount: 17
            },

            // PART II: TAWHID AND FIQH (Modules 08-14)
            { 
                id: 8, 
                section: "2", 
                folder: "08_Tawhid_Fiqh", 
                title: "Tawhid & Fiqh", 
                icon: "🤲", 
                subfolderCount: 5
            },
            { 
                id: 9, 
                section: "2", 
                folder: "09_Articles_Faith", 
                title: "Articles of Faith", 
                icon: "📋", 
                subfolderCount: 0
            },
            { 
                id: 10, 
                section: "2", 
                folder: "10_Ibadat", 
                title: "Ibadat (Worship)", 
                icon: "🕌", 
                subfolderCount: 7
            },
            { 
                id: 11, 
                section: "2", 
                folder: "11_Family_Matters", 
                title: "Family Matters", 
                icon: "👪", 
                subfolderCount: 4
            },
            { 
                id: 12, 
                section: "2", 
                folder: "12_Sources_Law", 
                title: "Sources & Schools of Law", 
                icon: "📚", 
                subfolderCount: 0
            },
            { 
                id: 13, 
                section: "2", 
                folder: "13_Economic_System", 
                title: "Islamic Economic System", 
                icon: "💰", 
                subfolderCount: 0
            },
            { 
                id: 14, 
                section: "2", 
                folder: "14_Political_System", 
                title: "Islamic Political System", 
                icon: "🏛️", 
                subfolderCount: 0
            },

            // PART III: ISLAMIC HISTORY AND CIVILIZATION (Modules 15-20)
            { 
                id: 15, 
                section: "3", 
                folder: "15_Pre_Islamic_Arabia", 
                title: "Pre-Islamic Arabia (Jahiliyyah)", 
                icon: "🏜️", 
                subfolderCount: 0
            },
            { 
                id: 16, 
                section: "3", 
                folder: "16_Life_Prophet", 
                title: "Life of Prophet Muhammad (SAW)", 
                icon: "🕊️", 
                subfolderCount: 9
            },
            { 
                id: 17, 
                section: "3", 
                folder: "17_Rightly_Guided_Caliphs", 
                title: "The Rightly Guided Caliphs", 
                icon: "👥", 
                subfolderCount: 0
            },
            { 
                id: 18, 
                section: "3", 
                folder: "18_Islam_Africa", 
                title: "Islam in Africa", 
                icon: "🌍", 
                subfolderCount: 0
            },
            { 
                id: 19, 
                section: "3", 
                folder: "19_Impact_West_Africa", 
                title: "Impact in West Africa", 
                icon: "🏛️", 
                subfolderCount: 0
            },
            { 
                id: 20, 
                section: "3", 
                folder: "20_Education", 
                title: "Contributions to Education", 
                icon: "🎓", 
                subfolderCount: 6
            }
        ];

        const grid = document.getElementById('gridContainer');

        // === 2. RENDER FUNCTION WITH SECTION HEADERS ===
        function renderModules() {
            grid.innerHTML = '';
            
            // Group by section
            const sections = {
                '1': 'PART I: Revelation, Qur\'an & Hadith',
                '2': 'PART II: Tawhid & Fiqh (Faith & Jurisprudence)',
                '3': 'PART III: Islamic History & Civilization'
            };
            
            // For each section, add header and cards
            ['1', '2', '3'].forEach(sectionCode => {
                const sectionModules = modules.filter(m => m.section === sectionCode);
                
                if (sectionModules.length > 0) {
                    // Add section header
                    const headerDiv = document.createElement('div');
                    headerDiv.className = 'section-header';
                    headerDiv.innerHTML = `
                        <div class="section-title">${sections[sectionCode]}</div>
                        <div class="section-divider"></div>
                    `;
                    grid.appendChild(headerDiv);
                    
                    // Add cards for this section
                    sectionModules.forEach(mod => {
                        // Link to the main module folder (which contains index.md)
                        const link = `./${mod.folder}/`;
                        
                        const card = document.createElement('a');
                        card.href = link;
                        card.className = 'card';
                        
                        let subfolderHtml = '';
                        if (mod.subfolderCount > 0) {
                            subfolderHtml = `<div class="subfolder-info"><span class="subfolder-count">${mod.subfolderCount} subtopics</span></div>`;
                        }
                        
                        card.innerHTML = `
                            <div class="card-top">
                                <span class="card-num">${mod.id.toString().padStart(2, '0')}</span>
                                <span class="card-icon">${mod.icon}</span>
                            </div>
                            <div class="card-title">${mod.title}</div>
                            ${subfolderHtml}
                            <div class="card-footer">
                                <div class="arrow-btn">➜</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            });
        }

        // Initial Load
        renderModules();

    </script>
</body>
</html>
