<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Atom Stadium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-cyan: #00d2ff;
            --accent-red: #ff4444;
            --accent-blue: #4488ff;
            --accent-amber: #ff8844;
            --panel-bg: rgba(8, 8, 18, 0.82);
            --border-subtle: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: #050510;
            color: #fff;
        }
        #canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        /* ---- Loading ---- */
        #loading {
            position: fixed; inset: 0;
            background: #050510;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
            transition: opacity 1s ease, visibility 1s;
        }
        #loading.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .ld-atom { width: 90px; height: 90px; position: relative; }
        .ld-orbit {
            position: absolute; top: 50%; left: 50%;
            width: 70px; height: 70px; margin: -35px;
            border: 2px solid rgba(0,210,255,0.25);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: ld-spin 1.8s linear infinite;
        }
        .ld-orbit:nth-child(2) { transform: rotate(60deg); animation-duration: 2.3s; }
        .ld-orbit:nth-child(3) { transform: rotate(120deg); animation-duration: 2.8s; }
        .ld-core {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px; margin: -7px;
            background: radial-gradient(circle, #ff6655, #cc2222);
            border-radius: 50%;
            box-shadow: 0 0 24px rgba(255,60,40,0.7);
        }
        .ld-text {
            margin-top: 28px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        @keyframes ld-spin { to { transform: rotate(360deg); } }

        /* ---- UI Overlay ---- */
        #ui-overlay {
            position: fixed; inset: 0; z-index: 10; pointer-events: none;
        }

        /* Title */
        .title-bar {
            position: absolute; top: 14px; left: 16px;
            opacity: 0; animation: fade-up 0.7s ease 1.2s forwards;
        }
        .title-main {
            font-size: clamp(20px, 5vw, 32px);
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 40%, var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.15;
        }
        .title-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(9px, 2vw, 12px);
            color: var(--accent-cyan);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
            opacity: 0.7;
        }

        /* Edu labels */
        .edu-label {
            position: absolute;
            padding: 7px 14px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(9px, 2vw, 12px);
            white-space: nowrap;
            border: 1px solid var(--border-subtle);
            pointer-events: auto;
            cursor: default;
            opacity: 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .edu-label:hover {
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(0,210,255,0.15);
        }
        .edu-label.l-nucleus {
            animation: fade-up 0.6s ease 1.6s forwards;
            border-color: rgba(255,100,50,0.25);
        }
        .edu-label.l-empty {
            animation: fade-up 0.6s ease 2s forwards;
            border-color: rgba(0,210,255,0.2);
        }
        .edu-label.l-electron {
            animation: fade-up 0.6s ease 2.4s forwards;
            border-color: rgba(0,210,255,0.25);
        }
        .hl-red { color: var(--accent-red); font-weight: 600; }
        .hl-blue { color: var(--accent-blue); font-weight: 600; }
        .hl-cyan { color: var(--accent-cyan); font-weight: 600; }
        .hl-amber { color: var(--accent-amber); font-weight: 600; }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Controls */
        .controls {
            position: absolute;
            top: 14px; right: 14px;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: auto;
            opacity: 0;
            animation: fade-up 0.5s ease 2.6s forwards;
        }
        .ctrl-btn {
            width: 42px; height: 42px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            color: #fff;
            font-size: 17px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s;
        }
        .ctrl-btn:hover { background: rgba(0,210,255,0.12); border-color: rgba(0,210,255,0.3); }
        .ctrl-btn.active { background: rgba(0,210,255,0.18); border-color: var(--accent-cyan); color: var(--accent-cyan); }

        /* Info panel */
        .info-panel {
            position: absolute;
            bottom: 14px; left: 14px; right: 14px;
            background: var(--panel-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 14px;
            border: 1px solid var(--border-subtle);
            padding: 14px 16px;
            pointer-events: auto;
            opacity: 0;
            animation: fade-up 0.8s ease 2.8s forwards;
        }
        .info-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            margin-bottom: 10px;
            text-align: center;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .info-item { text-align: center; }
        .info-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            vertical-align: middle;
        }
        .info-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(8px, 1.6vw, 10px);
            color: rgba(255,255,255,0.45);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }
        .info-value {
            font-size: clamp(16px, 4vw, 24px);
            font-weight: 700;
            line-height: 1.2;
        }
        .dot-proton { background: var(--accent-red); box-shadow: 0 0 6px rgba(255,68,68,0.5); }
        .dot-neutron { background: var(--accent-blue); box-shadow: 0 0 6px rgba(68,136,255,0.5); }
        .dot-electron { background: var(--accent-cyan); box-shadow: 0 0 6px rgba(0,210,255,0.5); }

        /* Element badge */
        .element-badge {
            position: absolute;
            top: 14px; left: 50%; transform: translateX(-50%);
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,100,50,0.2);
            border-radius: 12px;
            padding: 8px 18px;
            text-align: center;
            pointer-events: auto;
            opacity: 0;
            animation: fade-up 0.6s ease 1.4s forwards;
        }
        .element-symbol {
            font-size: clamp(28px, 6vw, 40px);
            font-weight: 800;
            color: var(--accent-amber);
            line-height: 1;
        }
        .element-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(9px, 1.8vw, 11px);
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 520px) {
            .info-panel { padding: 10px 12px; border-radius: 12px; }
            .controls { top: auto; bottom: 100px; right: 10px; flex-direction: row; }
            .element-badge { display: none; }
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div id="loading">
        <div class="ld-atom">
            <div class="ld-orbit"></div>
            <div class="ld-orbit"></div>
            <div class="ld-orbit"></div>
            <div class="ld-core"></div>
        </div>
        <div class="ld-text">Constructing Atom</div>
    </div>

    <!-- Canvas -->
    <div id="canvas-container"></div>

    <!-- UI -->
    <div id="ui-overlay">
        <div class="title-bar">
            <div class="title-main">The Atom Stadium</div>
            <div class="title-sub">Rutherford Model &middot; Interactive 3D</div>
        </div>

        <div class="element-badge">
            <div class="element-symbol">C</div>
            <div class="element-name">Carbon-12</div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="btnPlay" title="Play / Pause">⏸</button>
            <button class="ctrl-btn" id="btnZoom" title="Zoom to Nucleus">🔬</button>
            <button class="ctrl-btn" id="btnReset" title="Reset View">↺</button>
        </div>

        <div class="edu-label l-nucleus" id="labelNucleus" style="left:50%; top:42%; transform:translateX(-50%);">
            <span class="hl-amber">Nucleus</span> &mdash; <span class="hl-red">99.9%</span> of the atom's mass
        </div>
        <div class="edu-label l-empty" id="labelEmpty" style="left:50%; top:20%; transform:translateX(-50%);">
            ✦ <span class="hl-cyan">Mostly Empty Space</span> ✦
        </div>
        <div class="edu-label l-electron" id="labelElectron" style="right:8%; top:55%; transform:translateY(-50%);">
            <span class="hl-cyan">Electrons (−)</span> orbit at stadium edges
        </div>

        <div class="info-panel">
            <div class="info-title">Carbon-12 &middot; Subatomic Particles</div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label"><span class="info-dot dot-proton"></span>Protons</div>
                    <div class="info-value" style="color:var(--accent-red);">6 <small style="font-size:0.55em;opacity:0.7;">(+)</small></div>
                </div>
                <div class="info-item">
                    <div class="info-label"><span class="info-dot dot-neutron"></span>Neutrons</div>
                    <div class="info-value" style="color:var(--accent-blue);">6 <small style="font-size:0.55em;opacity:0.7;">(0)</small></div>
                </div>
                <div class="info-item">
                    <div class="info-label"><span class="info-dot dot-electron"></span>Electrons</div>
                    <div class="info-value" style="color:var(--accent-cyan);">6 <small style="font-size:0.55em;opacity:0.7;">(−)</small></div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        /* ========== HELPERS ========== */
        function makeGlowTexture(hexColor, size) {
            const s = size || 128;
            const cv = document.createElement('canvas');
            cv.width = s; cv.height = s;
            const ctx = cv.getContext('2d');
            const c = new THREE.Color(hexColor);
            const r = Math.floor(c.r * 255), g = Math.floor(c.g * 255), b = Math.floor(c.b * 255);
            const grad = ctx.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
            grad.addColorStop(0, `rgba(${r},${g},${b},1)`);
            grad.addColorStop(0.25, `rgba(${r},${g},${b},0.5)`);
            grad.addColorStop(0.6, `rgba(${r},${g},${b},0.1)`);
            grad.addColorStop(1, `rgba(0,0,0,0)`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, s, s);
            return new THREE.CanvasTexture(cv);
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        /* ========== SCENE ========== */
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x040410);
        scene.fog = new THREE.FogExp2(0x040410, 0.006);

        const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.1, 600);
        camera.position.set(40, 28, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 5;
        controls.maxDistance = 120;
        controls.maxPolarAngle = Math.PI * 0.88;
        controls.target.set(0, 2, 0);

        /* ========== LIGHTING ========== */
        scene.add(new THREE.AmbientLight(0x181830, 1.0));

        const floodCfg = [
            { pos: [-34, 40, -34], target: [0, 0, 0] },
            { pos: [34, 40, -34], target: [0, 0, 0] },
            { pos: [-34, 40, 34], target: [0, 0, 0] },
            { pos: [34, 40, 34], target: [0, 0, 0] }
        ];
        floodCfg.forEach(cfg => {
            const spot = new THREE.SpotLight(0xfff2e0, 50, 120, Math.PI / 4.5, 0.6, 1);
            spot.position.set(...cfg.pos);
            spot.target.position.set(...cfg.target);
            spot.castShadow = true;
            spot.shadow.mapSize.set(512, 512);
            scene.add(spot);
            scene.add(spot.target);

            // Tower
            const tGeo = new THREE.CylinderGeometry(0.35, 0.6, 40, 6);
            const tMat = new THREE.MeshStandardMaterial({ color: 0x2a2a35, metalness: 0.85, roughness: 0.25 });
            const tower = new THREE.Mesh(tGeo, tMat);
            tower.position.set(cfg.pos[0], 20, cfg.pos[2]);
            tower.castShadow = true;
            scene.add(tower);

            // Fixture glow
            const fGlow = new THREE.Sprite(
                new THREE.SpriteMaterial({ map: makeGlowTexture(0xfff2e0), transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending })
            );
            fGlow.scale.set(6, 6, 1);
            fGlow.position.set(...cfg.pos);
            scene.add(fGlow);
        });

        // Nucleus point light
        const nLight = new THREE.PointLight(0xff7733, 10, 18);
        nLight.position.set(0, 2.5, 0);
        scene.add(nLight);

        /* ========== FIELD ========== */
        const FIELD_R = 30;
        const fieldGeo = new THREE.CircleGeometry(FIELD_R, 80);
        const fieldMat = new THREE.MeshStandardMaterial({ color: 0x17592a, roughness: 0.92, metalness: 0 });
        const field = new THREE.Mesh(fieldGeo, fieldMat);
        field.rotation.x = -Math.PI / 2;
        field.receiveShadow = true;
        scene.add(field);

        // Field markings
        [9, 18, 27].forEach(r => {
            const rGeo = new THREE.RingGeometry(r - 0.07, r + 0.07, 80);
            const rMat = new THREE.MeshBasicMaterial({ color: 0x228838, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(rGeo, rMat);
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.02;
            scene.add(ring);
        });

        // Center line cross
        const clGeo = new THREE.PlaneGeometry(0.12, FIELD_R * 2);
        const clMat = new THREE.MeshBasicMaterial({ color: 0x228838, side: THREE.DoubleSide });
        const clH = new THREE.Mesh(clGeo, clMat);
        clH.rotation.x = -Math.PI / 2;
        clH.position.y = 0.02;
        scene.add(clH);
        const clV = clH.clone();
        clV.rotation.z = Math.PI / 2;
        scene.add(clV);

        /* ========== STADIUM SEATING ========== */
        const TIERS = 6;
        for (let i = 0; i < TIERS; i++) {
            const innerR = FIELD_R + 1 + i * 3.2;
            const outerR = innerR + 3;
            const h = 1.5 + i * 2.8;
            const hue = 0.62 + i * 0.01;
            const lightness = 0.1 + i * 0.025;

            // Seat surface
            const tGeo = new THREE.RingGeometry(innerR, outerR, 80);
            const tMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(hue, 0.12, lightness),
                roughness: 0.75, metalness: 0.15
            });
            const tier = new THREE.Mesh(tGeo, tMat);
            tier.rotation.x = -Math.PI / 2;
            tier.position.y = h;
            tier.receiveShadow = true;
            scene.add(tier);

            // Front wall
            const wallH = i === 0 ? h : 2.8;
            const wallY = i === 0 ? h / 2 : h - 1.4;
            const wGeo = new THREE.CylinderGeometry(innerR, innerR, wallH, 80, 1, true);
            const wMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color().setHSL(hue, 0.1, lightness - 0.03),
                roughness: 0.8, side: THREE.DoubleSide
            });
            const wall = new THREE.Mesh(wGeo, wMat);
            wall.position.y = wallY;
            scene.add(wall);
        }

        // Outer wall
        const owR = FIELD_R + 1 + TIERS * 3.2 + 3;
        const owGeo = new THREE.CylinderGeometry(owR, owR, TIERS * 2.8 + 2, 80, 1, true);
        const owMat = new THREE.MeshStandardMaterial({ color: 0x151520, roughness: 0.7, side: THREE.DoubleSide });
        const ow = new THREE.Mesh(owGeo, owMat);
        ow.position.y = (TIERS * 2.8 + 2) / 2;
        scene.add(ow);

        /* ========== NUCLEUS ========== */
        const NUCLEUS_Y = 2.0;
        const nucleusGroup = new THREE.Group();
        nucleusGroup.position.set(0, NUCLEUS_Y, 0);
        scene.add(nucleusGroup);

        // Glass shell
        const shellGeo = new THREE.SphereGeometry(2.5, 40, 40);
        const shellMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.12,
            roughness: 0.02,
            metalness: 0.0,
            transmission: 0.9,
            thickness: 0.4,
            ior: 1.45,
            clearcoat: 1.0,
            clearcoatRoughness: 0.05,
            envMapIntensity: 0.8,
            side: THREE.DoubleSide
        });
        nucleusGroup.add(new THREE.Mesh(shellGeo, shellMat));

        // Pack nucleons
        function packSpheres(count, maxR, minDist) {
            const pts = [];
            for (let i = 0; i < count; i++) {
                let best = null, bestMinD = -1;
                for (let a = 0; a < 400; a++) {
                    const th = Math.random() * Math.PI * 2;
                    const ph = Math.acos(2 * Math.random() - 1);
                    const r = Math.pow(Math.random(), 0.33) * maxR;
                    const x = r * Math.sin(ph) * Math.cos(th);
                    const y = r * Math.sin(ph) * Math.sin(th);
                    const z = r * Math.cos(ph);
                    let md = Infinity;
                    for (const p of pts) {
                        const d = Math.sqrt((x - p.x) ** 2 + (y - p.y) ** 2 + (z - p.z) ** 2);
                        md = Math.min(md, d);
                    }
                    if (pts.length === 0 || md > bestMinD) {
                        bestMinD = md;
                        best = { x, y, z };
                    }
                    if (bestMinD >= minDist) break;
                }
                pts.push(best);
            }
            return pts;
        }

        const nucleonPositions = packSpheres(12, 1.5, 0.78);
        const nucleonR = 0.42;
        nucleonPositions.forEach((p, i) => {
            const isProton = i < 6;
            const geo = new THREE.SphereGeometry(nucleonR, 20, 20);
            const mat = new THREE.MeshStandardMaterial({
                color: isProton ? 0xff3333 : 0x3366ff,
                emissive: isProton ? 0x551111 : 0x111155,
                emissiveIntensity: 0.6,
                roughness: 0.28,
                metalness: 0.35
            });
            const m = new THREE.Mesh(geo, mat);
            m.position.set(p.x, p.y, p.z);
            nucleusGroup.add(m);

            // Tiny label sprites
            const labelCanvas = document.createElement('canvas');
            labelCanvas.width = 128; labelCanvas.height = 48;
            const lctx = labelCanvas.getContext('2d');
            lctx.font = 'bold 28px JetBrains Mono, monospace';
            lctx.textAlign = 'center';
            lctx.textBaseline = 'middle';
            lctx.fillStyle = isProton ? '#ff6655' : '#6699ff';
            lctx.fillText(isProton ? '+' : '0', 64, 24);
            const lTex = new THREE.CanvasTexture(labelCanvas);
            const lSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: lTex, transparent: true, depthTest: false }));
            lSprite.scale.set(0.5, 0.2, 1);
            lSprite.position.set(p.x, p.y + nucleonR + 0.12, p.z);
            nucleusGroup.add(lSprite);
        });

        // Nucleus glow
        const nGlowSprite = new THREE.Sprite(
            new THREE.SpriteMaterial({ map: makeGlowTexture(0xff8844, 256), transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending, depthWrite: false })
        );
        nGlowSprite.scale.set(10, 10, 1);
        nucleusGroup.add(nGlowSprite);

        /* ========== ELECTRONS ========== */
        const ORBIT_CONFIGS = [
            { radius: 20, speed: 0.40, tiltX: 0.30, tiltZ: 0.10, phase: 0.0 },
            { radius: 22, speed: 0.34, tiltX: -0.25, tiltZ: 0.35, phase: 1.05 },
            { radius: 19, speed: 0.46, tiltX: 0.50, tiltZ: -0.20, phase: 2.09 },
            { radius: 23, speed: 0.30, tiltX: -0.40, tiltZ: -0.15, phase: 3.14 },
            { radius: 21, speed: 0.38, tiltX: 0.15, tiltZ: 0.45, phase: 4.19 },
            { radius: 24, speed: 0.32, tiltX: -0.10, tiltZ: -0.40, phase: 5.24 }
        ];

        const electrons = [];
        const TRAIL_LEN = 50;

        ORBIT_CONFIGS.forEach(cfg => {
            // Orbit group (handles tilt)
            const orbitGroup = new THREE.Group();
            orbitGroup.rotation.x = cfg.tiltX;
            orbitGroup.rotation.z = cfg.tiltZ;
            orbitGroup.position.y = NUCLEUS_Y;
            scene.add(orbitGroup);

            // Orbit ring
            const curve = new THREE.EllipseCurve(0, 0, cfg.radius, cfg.radius, 0, Math.PI * 2, false);
            const pts2d = curve.getPoints(120);
            const ringGeo = new THREE.BufferGeometry().setFromPoints(pts2d.map(p => new THREE.Vector3(p.x, 0, p.y)));
            const ringLine = new THREE.Line(ringGeo, new THREE.LineBasicMaterial({ color: 0x00d2ff, transparent: true, opacity: 0.06 }));
            orbitGroup.add(ringLine);

            // Electron mesh
            const eGeo = new THREE.SphereGeometry(0.38, 14, 14);
            const eMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, transparent: true, opacity: 0.95 });
            const eMesh = new THREE.Mesh(eGeo, eMat);

            // Glow sprite on electron
            const eGlow = new THREE.Sprite(
                new THREE.SpriteMaterial({ map: makeGlowTexture(0x00d2ff), transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending, depthWrite: false })
            );
            eGlow.scale.set(4, 4, 1);
            eMesh.add(eGlow);
            orbitGroup.add(eMesh);

            // Trail
            const trailPositions = new Float32Array(TRAIL_LEN * 3);
            const trailColors = new Float32Array(TRAIL_LEN * 3);
            for (let t = 0; t < TRAIL_LEN; t++) {
                const alpha = t / TRAIL_LEN;
                trailColors[t * 3] = 0;
                trailColors[t * 3 + 1] = 0.82 * alpha;
                trailColors[t * 3 + 2] = alpha;
            }
            const trailGeo = new THREE.BufferGeometry();
            trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
            trailGeo.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));
            const trail = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({
                vertexColors: true, transparent: true, opacity: 0.5
            }));
            orbitGroup.add(trail);

            electrons.push({
                mesh: eMesh,
                trail: { geo: trailGeo, pos: trailPositions, head: 0 },
                cfg
            });
        });

        /* ========== BACKGROUND STARS ========== */
        const STAR_COUNT = 600;
        const starPos = new Float32Array(STAR_COUNT * 3);
        for (let i = 0; i < STAR_COUNT; i++) {
            starPos[i * 3] = (Math.random() - 0.5) * 250;
            starPos[i * 3 + 1] = 30 + Math.random() * 80;
            starPos[i * 3 + 2] = (Math.random() - 0.5) * 250;
        }
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.25, transparent: true, opacity: 0.55 })));

        /* ========== FLOATING DUST PARTICLES ========== */
        const DUST = 200;
        const dustPos = new Float32Array(DUST * 3);
        const dustVel = [];
        for (let i = 0; i < DUST; i++) {
            const ang = Math.random() * Math.PI * 2;
            const rad = 5 + Math.random() * 25;
            dustPos[i * 3] = Math.cos(ang) * rad;
            dustPos[i * 3 + 1] = 0.5 + Math.random() * 8;
            dustPos[i * 3 + 2] = Math.sin(ang) * rad;
            dustVel.push({ vx: (Math.random() - 0.5) * 0.02, vy: (Math.random() - 0.5) * 0.01, vz: (Math.random() - 0.5) * 0.02 });
        }
        const dustGeo = new THREE.BufferGeometry();
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        const dustPts = new THREE.Points(dustGeo, new THREE.PointsMaterial({
            color: 0xfff8ee, size: 0.12, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending
        }));
        scene.add(dustPts);

        /* ========== ANIMATION ========== */
        let playing = true;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const t = clock.getElapsedTime();

            if (playing) {
                // Nucleus slow rotation + bob
                nucleusGroup.rotation.y += dt * 0.12;
                nucleusGroup.position.y = NUCLEUS_Y + Math.sin(t * 0.7) * 0.15;

                // Nucleus glow pulse
                nGlowSprite.material.opacity = 0.35 + Math.sin(t * 1.8) * 0.1;
                nLight.intensity = 8 + Math.sin(t * 1.8) * 3;

                // Electrons
                electrons.forEach(e => {
                    const angle = t * e.cfg.speed + e.cfg.phase;
                    const x = Math.cos(angle) * e.cfg.radius;
                    const z = Math.sin(angle) * e.cfg.radius;
                    e.mesh.position.set(x, 0, z);

                    // Trail update
                    const tr = e.trail;
                    const h3 = tr.head * 3;
                    tr.pos[h3] = x;
                    tr.pos[h3 + 1] = 0;
                    tr.pos[h3 + 2] = z;
                    tr.head = (tr.head + 1) % TRAIL_LEN;
                    tr.geo.attributes.position.needsUpdate = true;
                });

                // Dust
                const dArr = dustGeo.attributes.position.array;
                for (let i = 0; i < DUST; i++) {
                    dArr[i * 3] += dustVel[i].vx;
                    dArr[i * 3 + 1] += dustVel[i].vy;
                    dArr[i * 3 + 2] += dustVel[i].vz;
                    if (dArr[i * 3 + 1] > 10) dustVel[i].vy *= -1;
                    if (dArr[i * 3 + 1] < 0.3) dustVel[i].vy = Math.abs(dustVel[i].vy);
                }
                dustGeo.attributes.position.needsUpdate = true;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        /* ========== RESIZE ========== */
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        /* ========== CONTROLS ========== */
        const btnPlay = document.getElementById('btnPlay');
        const btnZoom = document.getElementById('btnZoom');
        const btnReset = document.getElementById('btnReset');

        btnPlay.addEventListener('click', () => {
            playing = !playing;
            if (!playing) clock.stop(); else clock.start();
            btnPlay.textContent = playing ? '⏸' : '▶';
            btnPlay.classList.toggle('active', !playing);
        });

        let zoomed = false;
        btnZoom.addEventListener('click', () => {
            zoomed = !zoomed;
            btnZoom.classList.toggle('active', zoomed);
            if (zoomed) {
                flyCamera(new THREE.Vector3(5, 3.5, 5), new THREE.Vector3(0, NUCLEUS_Y, 0));
            } else {
                flyCamera(new THREE.Vector3(40, 28, 50), new THREE.Vector3(0, 2, 0));
            }
        });

        btnReset.addEventListener('click', () => {
            zoomed = false;
            btnZoom.classList.remove('active');
            flyCamera(new THREE.Vector3(40, 28, 50), new THREE.Vector3(0, 2, 0));
        });

        function flyCamera(toPos, toLook) {
            const fromPos = camera.position.clone();
            const fromLook = controls.target.clone();
            const dur = 1400;
            const start = performance.now();
            function step(now) {
                const p = Math.min((now - start) / dur, 1);
                const e = easeInOutCubic(p);
                camera.position.lerpVectors(fromPos, toPos, e);
                controls.target.lerpVectors(fromLook, toLook, e);
                if (p < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        /* ========== LOADING DONE ========== */
        setTimeout(() => { document.getElementById('loading').classList.add('hidden'); }, 1600);

        animate();
    </script>
</body>
</html>
