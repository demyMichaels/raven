<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Atom Stadium · Lite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: #03030a;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
        }
        #canvas-container {
            position: fixed; inset: 0; z-index: 1;
        }

        /* Ultra minimal loading */
        #loading {
            position: fixed; inset: 0;
            background: #03030a;
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .ld-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(0,200,255,0.2);
            border-top-color: #00c8ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* UI Overlay - simplified */
        #ui-overlay {
            position: fixed; inset: 0; z-index: 10; pointer-events: none;
        }

        /* Title - minimal */
        .title-bar {
            position: absolute; top: 10px; left: 12px;
            opacity: 0; animation: fadeIn 0.4s ease 0.5s forwards;
        }
        .title-main {
            font-size: 24px; font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 5px rgba(0,200,255,0.3);
        }
        .title-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #00c8ff;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* Controls - minimal */
        .controls {
            position: absolute; top: 10px; right: 10px;
            display: flex; gap: 6px;
            pointer-events: auto;
            opacity: 0; animation: fadeIn 0.4s ease 0.7s forwards;
        }
        .ctrl-btn {
            width: 40px; height: 40px;
            background: rgba(10,10,20,0.9);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .ctrl-btn:active { background: #1a2a3a; }

        /* Info panel - simplified */
        .info-panel {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(8,8,16,0.95);
            border-radius: 12px;
            padding: 10px 12px;
            pointer-events: auto;
            opacity: 0; animation: fadeIn 0.4s ease 0.9s forwards;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .info-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
        }
        .info-item { text-align: center; }
        .info-label {
            font-size: 10px; color: rgba(255,255,255,0.5);
            font-family: 'JetBrains Mono', monospace;
        }
        .info-value {
            font-size: 20px; font-weight: 700;
        }
        .value-proton { color: #ff5e5e; }
        .value-neutron { color: #5e9eff; }
        .value-electron { color: #5effc2; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .title-main { font-size: 20px; }
            .controls { top: auto; bottom: 80px; }
        }
    </style>
</head>
<body>
    <!-- Ultra minimal loading -->
    <div id="loading">
        <div class="ld-spinner"></div>
    </div>

    <!-- Canvas -->
    <div id="canvas-container"></div>

    <!-- UI -->
    <div id="ui-overlay">
        <div class="title-bar">
            <div class="title-main">Atom Stadium · Lite</div>
            <div class="title-sub">Carbon-12</div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="btnPlay">⏸</button>
            <button class="ctrl-btn" id="btnZoom">🔬</button>
            <button class="ctrl-btn" id="btnReset">↺</button>
        </div>

        <div class="info-panel">
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">PROTONS</div>
                    <div class="info-value value-proton">6</div>
                </div>
                <div class="info-item">
                    <div class="info-label">NEUTRONS</div>
                    <div class="info-value value-neutron">6</div>
                </div>
                <div class="info-item">
                    <div class="info-label">ELECTRONS</div>
                    <div class="info-value value-electron">6</div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Force LOW-END settings regardless of device
        const PERF = {
            pixelRatio: 1,
            shadows: false,
            fog: false,
            sphereSegs: 8,        // Very low poly
            electronSegs: 6,       // Minimal electrons
            orbitSegs: 32,         // Fewer line segments
            stadiumSegs: 24,        // Low-poly stadium
            nucleonCount: 12,       // Full nucleons but low-poly
            starCount: 100,         // Few stars
            dustCount: 40,          // Minimal dust
            trailLen: 15,           // Short trails
            antialias: false
        };

        /* ========== SCENE SETUP ========== */
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03030a);

        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 500);
        camera.position.set(30, 20, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'low-power' });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(1);
        container.appendChild(renderer.domElement);

        // Simple orbit controls reimplementation (lighter than full OrbitControls)
        let target = new THREE.Vector3(0, 2, 0);
        let angleX = 0.8, angleY = 0.6;
        let distance = 45;
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };

        function updateCameraPosition() {
            const x = target.x + distance * Math.sin(angleY) * Math.cos(angleX);
            const y = target.y + distance * Math.cos(angleY);
            const z = target.z + distance * Math.sin(angleY) * Math.sin(angleX);
            camera.position.set(x, y, z);
            camera.lookAt(target);
        }
        updateCameraPosition();

        // Mouse/Touch controls
        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouse.x = e.clientX;
            lastMouse.y = e.clientY;
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            angleX += dx * 0.005;
            angleY = Math.max(0.1, Math.min(1.4, angleY + dy * 0.005));
            updateCameraPosition();
            lastMouse.x = e.clientX;
            lastMouse.y = e.clientY;
        });
        window.addEventListener('mouseup', () => isDragging = false);
        // Touch support
        renderer.domElement.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                isDragging = true;
                lastMouse.x = e.touches[0].clientX;
                lastMouse.y = e.touches[0].clientY;
            }
        });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging || e.touches.length !== 1) return;
            e.preventDefault();
            const dx = e.touches[0].clientX - lastMouse.x;
            const dy = e.touches[0].clientY - lastMouse.y;
            angleX += dx * 0.005;
            angleY = Math.max(0.1, Math.min(1.4, angleY + dy * 0.005));
            updateCameraPosition();
            lastMouse.x = e.touches[0].clientX;
            lastMouse.y = e.touches[0].clientY;
        });
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchcancel', () => isDragging = false);

        // Zoom with wheel
        window.addEventListener('wheel', (e) => {
            distance = Math.max(15, Math.min(80, distance + e.deltaY * 0.02));
            updateCameraPosition();
        });

        /* ========== LIGHTING (minimal) ========== */
        scene.add(new THREE.AmbientLight(0x404060));
        const light1 = new THREE.DirectionalLight(0xffffff, 1.2);
        light1.position.set(10, 30, 20);
        scene.add(light1);
        const light2 = new THREE.DirectionalLight(0x5577aa, 0.6);
        light2.position.set(-20, 10, -30);
        scene.add(light2);
        
        // Center glow
        const centerLight = new THREE.PointLight(0xff8844, 5, 20);
        centerLight.position.set(0, 2, 0);
        scene.add(centerLight);

        /* ========== SIMPLE FIELD ========== */
        const FIELD_R = 25;
        const fieldGeo = new THREE.CircleGeometry(FIELD_R, 24);
        const fieldMat = new THREE.MeshStandardMaterial({ color: 0x12452a, roughness: 0.9 });
        const field = new THREE.Mesh(fieldGeo, fieldMat);
        field.rotation.x = -Math.PI / 2;
        field.position.y = 0;
        scene.add(field);

        // Simple rings (just 2)
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x1a5a2a, transparent: true, opacity: 0.3 });
        [10, 20].forEach(r => {
            const ringGeo = new THREE.RingGeometry(r - 0.2, r + 0.2, 32);
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.01;
            scene.add(ring);
        });

        /* ========== SIMPLE STADIUM SEATING ========== */
        const TIERS = 4; // Fewer tiers
        for (let i = 0; i < TIERS; i++) {
            const innerR = FIELD_R + 1 + i * 2.8;
            const outerR = innerR + 2.5;
            const h = 1.2 + i * 2.2;
            
            const tierGeo = new THREE.RingGeometry(innerR, outerR, PERF.stadiumSegs);
            const tierMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 0.8 });
            const tier = new THREE.Mesh(tierGeo, tierMat);
            tier.rotation.x = -Math.PI / 2;
            tier.position.y = h;
            scene.add(tier);
        }

        // Simple outer wall
        const wallGeo = new THREE.CylinderGeometry(FIELD_R + 12, FIELD_R + 12, 12, 32, 1);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x111118, side: THREE.BackSide });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.y = 6;
        scene.add(wall);

        /* ========== NUCLEUS ========== */
        const nucleusGroup = new THREE.Group();
        nucleusGroup.position.set(0, 2, 0);
        scene.add(nucleusGroup);

        // Simple nucleon geometry (shared)
        const nucleonGeo = new THREE.SphereGeometry(0.45, 6, 6); // Very low poly
        const protonMat = new THREE.MeshStandardMaterial({ color: 0xff5555, emissive: 0x331111 });
        const neutronMat = new THREE.MeshStandardMaterial({ color: 0x5555ff, emissive: 0x111133 });

        // Pre-calculated positions for 12 nucleons (simple distribution)
        const positions = [
            [0, 0, 0.9], [0.7, 0.4, -0.3], [-0.6, 0.5, 0.4], [0.3, -0.8, 0.2],
            [-0.4, -0.3, -0.8], [0.5, -0.2, -0.6], [-0.7, 0.3, -0.3], [0.2, 0.8, -0.2],
            [-0.2, -0.6, 0.7], [0.8, -0.4, 0.1], [-0.5, 0.6, -0.4], [0.1, 0.2, 0.9]
        ];

        for (let i = 0; i < 12; i++) {
            const isProton = i < 6;
            const nucleon = new THREE.Mesh(nucleonGeo, isProton ? protonMat : neutronMat);
            nucleon.position.set(positions[i][0], positions[i][1], positions[i][2]);
            nucleusGroup.add(nucleon);
        }

        /* ========== ELECTRONS (simplified) ========== */
        const electronConfigs = [
            { radius: 18, speed: 0.4, tilt: 0.2 },
            { radius: 20, speed: 0.3, tilt: -0.3 },
            { radius: 22, speed: 0.35, tilt: 0.5 },
            { radius: 19, speed: 0.45, tilt: -0.2 },
            { radius: 21, speed: 0.38, tilt: 0.1 },
            { radius: 23, speed: 0.32, tilt: -0.4 }
        ];

        const electrons = [];
        const electronGeo = new THREE.SphereGeometry(0.35, 5, 5); // Very low poly
        const electronMat = new THREE.MeshStandardMaterial({ color: 0x33ccff, emissive: 0x113355 });
        
        // Simple trail arrays (fixed size, no dynamic resizing)
        const trailPositions = new Array(6).fill().map(() => new Float32Array(PERF.trailLen * 3));

        electronConfigs.forEach((cfg, idx) => {
            const group = new THREE.Group();
            group.position.y = 2;
            
            // Orbit line (simple)
            const points = [];
            for (let i = 0; i <= 20; i++) {
                const a = (i / 20) * Math.PI * 2;
                points.push(new THREE.Vector3(Math.cos(a) * cfg.radius, 0, Math.sin(a) * cfg.radius));
            }
            const orbitGeo = new THREE.BufferGeometry().setFromPoints(points);
            const orbitLine = new THREE.Line(orbitGeo, new THREE.LineBasicMaterial({ color: 0x226688, transparent: true, opacity: 0.15 }));
            group.add(orbitLine);
            
            // Electron
            const electron = new THREE.Mesh(electronGeo, electronMat);
            group.add(electron);
            
            scene.add(group);
            
            electrons.push({
                group,
                electron,
                cfg,
                angle: idx * 1.0,
                trailIdx: 0,
                trail: trailPositions[idx]
            });
        });

        /* ========== SIMPLE STARS ========== */
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(PERF.starCount * 3);
        for (let i = 0; i < PERF.starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 200;
            starPos[i*3+1] = (Math.random() - 0.5) * 200;
            starPos[i*3+2] = (Math.random() - 0.5) * 200 - 50;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 }));
        scene.add(stars);

        /* ========== ANIMATION ========== */
        let playing = true;
        let lastTime = performance.now();

        function animate() {
            const time = performance.now() / 1000;
            const dt = Math.min(0.05, (performance.now() - lastTime) / 1000);
            lastTime = performance.now();

            if (playing) {
                // Rotate nucleus
                nucleusGroup.rotation.y += dt * 0.2;
                nucleusGroup.rotation.x += dt * 0.05;
                
                // Bob nucleus
                nucleusGroup.position.y = 2 + Math.sin(time * 1.5) * 0.1;
                
                // Pulse light
                centerLight.intensity = 5 + Math.sin(time * 2) * 1.5;

                // Update electrons
                electrons.forEach(e => {
                    e.angle += dt * e.cfg.speed;
                    const x = Math.cos(e.angle) * e.cfg.radius;
                    const z = Math.sin(e.angle) * e.cfg.radius;
                    e.electron.position.set(x, 0, z);
                    
                    // Simple tilt
                    e.group.rotation.x = e.cfg.tilt;
                    
                    // Update trail (simplified - just store positions)
                    const trailIdx = e.trailIdx * 3;
                    e.trail[trailIdx] = x;
                    e.trail[trailIdx + 1] = 0;
                    e.trail[trailIdx + 2] = z;
                    e.trailIdx = (e.trailIdx + 1) % PERF.trailLen;
                });
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        /* ========== RESIZE ========== */
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        /* ========== CONTROLS ========== */
        const btnPlay = document.getElementById('btnPlay');
        const btnZoom = document.getElementById('btnZoom');
        const btnReset = document.getElementById('btnReset');

        btnPlay.addEventListener('click', () => {
            playing = !playing;
            btnPlay.textContent = playing ? '⏸' : '▶';
        });

        btnZoom.addEventListener('click', () => {
            // Simple zoom toggle
            if (distance > 20) {
                distance = 12;
                target.set(0, 2.5, 0);
            } else {
                distance = 45;
                target.set(0, 2, 0);
            }
            updateCameraPosition();
        });

        btnReset.addEventListener('click', () => {
            distance = 45;
            angleX = 0.8;
            angleY = 0.6;
            target.set(0, 2, 0);
            updateCameraPosition();
        });

        /* ========== LOADING DONE ========== */
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 800);
    </script>
</body>
</html>
