<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Google tag (gtag.js) -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Atomic Structure & Bonding | Chemistry</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES (Dark Mode) --- */
        :root {
            --bg-deep: #0B0F19;
            --bg-surface: #151B2B;
            --primary: #6366F1;       /* Indigo */
            --accent: #10B981;        /* Emerald */
            --text-main: #FFFFFF;
            --text-muted: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
            --card-hover: rgba(99, 102, 241, 0.1);
            --font: 'Plus Jakarta Sans', sans-serif;
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font);
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            font-size: 16px; /* Base font size for better mobile readability */
        }

        a { text-decoration: none; color: inherit; }

        /* --- BACKGROUND EFFECTS --- */
        .glow-orb {
            position: fixed; width: 400px; height: 400px;
            background: var(--primary); filter: blur(150px); opacity: 0.15;
            border-radius: 50%; z-index: -1; pointer-events: none;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; background: var(--accent); }

        /* --- HEADER --- */
        header {
            padding: 1rem 1.2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }

        .brand { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--primary); }
        .brand-icon { width: 28px; height: 28px; background: var(--primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: white; }

        .user-pill {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 50px; border: 1px solid var(--border);
        }
        .user-avatar { width: 24px; height: 24px; background: var(--accent); border-radius: 50%; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:bold; color:black;}

        /* --- BACK BUTTON --- */
        .back-button-container {
            max-width: 1200px;
            margin: 0.8rem auto 0;
            padding: 0 1.2rem;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 0.4rem 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .back-button:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateX(-3px);
        }
        .back-button span {
            font-size: 1.1rem;
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 0.8rem 1.2rem 0.8rem;
            max-width: 800px; margin: 0 auto;
        }
        .hero h1 { 
            font-size: 1.8rem; 
            font-weight: 700; 
            margin-bottom: 0.2rem; 
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p { color: var(--text-muted); font-size: 0.95rem; }

        /* --- GRID LAYOUT (topics) --- */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            padding: 0 1.2rem;
            max-width: 800px; 
            margin: 1rem auto;
        }

        /* --- MODULE CARD --- */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            display: flex; flex-direction: column; justify-content: space-between;
            aspect-ratio: 1 / 1;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
            position: relative; overflow: hidden;
        }

        .card:hover {
            transform: translateY(-3px);
            background: linear-gradient(145deg, var(--bg-surface), var(--card-hover));
            border-color: var(--primary);
        }

        /* Card Visuals */
        .card-top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px; }
        .card-num { 
            font-size: 0.7rem; 
            color: var(--primary); 
            font-weight: 700; 
            background: rgba(99, 102, 241, 0.15);
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        .card-icon { font-size: 2rem; }
        
        .card-title {
            font-size: 0.95rem; 
            font-weight: 700; 
            line-height: 1.3; 
            margin-bottom: auto;
            color: #E2E8F0;
            padding-right: 0.5rem;
        }

        .card-footer {
            margin-top: 8px;
            display: flex; justify-content: flex-end;
        }
        
        .arrow-btn { 
            width: 26px; 
            height: 26px; 
            border-radius: 50%; 
            background: rgba(255,255,255,0.05); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-muted);
            font-size: 0.7rem;
            border: 1px solid var(--border);
        }
        .card:hover .arrow-btn { background: var(--primary); color: white; }

        /* --- AI TUTOR FLOATING BUTTON & PANEL --- */
        .ai-tutor-btn {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 52px;
            height: 52px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transition: transform 0.2s, background 0.2s;
            z-index: 100;
            border: none;
            color: white;
            font-size: 1.5rem;
        }
        .ai-tutor-btn:hover {
            transform: scale(1.1);
            background: var(--accent);
        }
        .ai-tutor-panel {
            position: fixed;
            bottom: 5rem;
            right: 1.5rem;
            width: 260px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            display: none;
            z-index: 99;
            backdrop-filter: blur(12px);
        }
        .ai-tutor-panel.active {
            display: block;
        }
        .ai-tutor-panel h3 {
            color: var(--accent);
            margin-bottom: 0.4rem;
            font-size: 1rem;
        }
        .ai-tutor-panel p {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
        }
        .ai-tutor-options {
            display: flex;
            gap: 0.8rem;
        }
        .ai-option {
            flex: 1;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.6rem 0.3rem;
            text-align: center;
            cursor: not-allowed;
            opacity: 0.6;
            transition: 0.2s;
        }
        .ai-option .icon {
            font-size: 1.3rem;
            display: block;
            margin-bottom: 0.2rem;
        }
        .ai-option .label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .coming-soon {
            text-align: center;
            font-size: 0.65rem;
            color: var(--accent);
            margin-top: 0.6rem;
            padding-top: 0.4rem;
            border-top: 1px solid var(--border);
        }

        /* --- VIDEO MODAL --- */
        .video-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
        }
        
        .video-modal-content {
            position: relative;
            margin: auto;
            width: 92%;
            max-width: 800px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .video-modal-close {
            position: absolute;
            top: -35px;
            right: 0;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
        }
        .video-modal-close:hover {
            color: var(--accent);
        }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            border: 1px solid var(--accent);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* --- RESPONSIVE FOR LARGER SCREENS --- */
        @media (min-width: 600px) {
            .module-grid { 
                grid-template-columns: repeat(3, 1fr); 
                gap: 1rem;
            }
            .hero h1 { font-size: 2.2rem; }
        }
        
        @media (min-width: 768px) {
            .module-grid { 
                grid-template-columns: repeat(4, 1fr); 
                gap: 1.2rem;
            }
            .card { aspect-ratio: 1.2 / 1; }
        }

    </style>
</head>
<body>

    <!-- Backgrounds -->
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>

    <!-- Header -->
    <header>
        <div class="brand">
            <div class="brand-icon">🔗</div>
            <span>Raven</span> Academy
        </div>
        <div class="user-pill">
            <span style="font-size:0.75rem; color:var(--text-muted);">Student</span>
            <div class="user-avatar">JS</div>
        </div>
    </header>

    <!-- Back Button -->
    <div class="back-button-container">
        <a href="../index.html" class="back-button">
            <span>←</span> Back
        </a>
    </div>

    <!-- Main Content -->
    <main>
        <div class="hero">
            <h1>Atomic Structure & Bonding</h1>
            <p>How atoms bond to form molecules</p>
        </div>

        <!-- Topic Grid -->
        <div class="module-grid" id="gridContainer"></div>
    </main>

    <!-- AI Tutor Floating Button & Panel -->
    <div class="ai-tutor-btn" id="aiTutorBtn">🤖</div>
    <div class="ai-tutor-panel" id="aiTutorPanel">
        <h3>🧠 AI Tutor</h3>
        <p>Ask about atomic structure, bonding, or orbitals</p>
        <div class="ai-tutor-options">
            <div class="ai-option">
                <span class="icon">💬</span>
                <span class="label">Chat</span>
            </div>
            <div class="ai-option">
                <span class="icon">🎤</span>
                <span class="label">Talk</span>
            </div>
        </div>
        <div class="coming-soon">✨ Coming soon</div>
    </div>

    <!-- Video Modal -->
    <div id="videoModal" class="video-modal">
        <div class="video-modal-content">
            <span class="video-modal-close" id="closeModal">&times;</span>
            <div class="video-wrapper">
                <iframe id="videoIframe" src="" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
            </div>
        </div>
    </div>

    <script>
        // === 1. BONDING MODULES DATA ===
        const modules = [
            { id: 1, num: "1.1", title: "Atomic Structure", icon: "⚛️", folder: "01_atomic_structure" },
            { id: 2, num: "1.2", title: "Bonding and Valency", icon: "🔗", folder: "02_bonding_and_valency" },
            { id: 3, num: "1.3", title: "Orbitals", icon: "🌀", folder: "03_orbitals" },
            { id: 4, num: "1.4", title: "Electronic Configuration", icon: "📋", folder: "04_electronic_configuration" },
            { id: 5, num: "1.5", title: "Ionic Bonding", icon: "⚡", folder: "05_ionic_bonding" },
            { id: 6, num: "1.6", title: "Covalent Bonding", icon: "🔗", folder: "06_covalent_bonding" },
            { id: 7, num: "1.7", title: "Bond Polarity", icon: "🧲", folder: "07_bond_polarity" },
            { id: 8, num: "1.8", title: "Conjugation", icon: "🔄", folder: "08_conjugation" },
            { id: 9, num: "1.9", title: "Aromaticity", icon: "🔄", folder: "09_aromaticity" },
            { id: 10, num: "1.10", title: "Resonance Structure", icon: "↩️", folder: "10_resonance_structure_and_curly_arro..." },
            { id: 11, num: "1.11", title: "Hydrogen Bonding", icon: "💧", folder: "11_hydrogen_bonding" },
            { id: 12, num: "1.12", title: "Molecular Models", icon: "🧪", folder: "12_molecular_models" }
        ];

        const grid = document.getElementById('gridContainer');

        // === 2. RENDER FUNCTION ===
        function renderModules() {
            grid.innerHTML = '';
            
            modules.forEach(mod => {
                const link = `./${mod.folder}/index.html`;

                const card = document.createElement('a');
                card.href = link;
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-top">
                        <span class="card-num">${mod.num}</span>
                        <span class="card-icon">${mod.icon}</span>
                    </div>
                    <div class="card-title">${mod.title}</div>
                    <div class="card-footer">
                        <div class="arrow-btn">➜</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Initial Load
        renderModules();

        // AI Tutor panel toggle
        const aiBtn = document.getElementById('aiTutorBtn');
        const aiPanel = document.getElementById('aiTutorPanel');

        aiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            aiPanel.classList.toggle('active');
        });

        // Click outside to close
        document.addEventListener('click', (e) => {
            if (!aiBtn.contains(e.target) && !aiPanel.contains(e.target)) {
                aiPanel.classList.remove('active');
            }
        });

        // Video Modal functionality (keeping for future use)
        const videoModal = document.getElementById('videoModal');
        const videoIframe = document.getElementById('videoIframe');
        const closeModal = document.getElementById('closeModal');
        
        window.openVideo = function(videoUrl) {
            let embedUrl = videoUrl;
            if (videoUrl.includes('youtu.be')) {
                const videoId = videoUrl.split('/').pop().split('?')[0];
                embedUrl = `https://www.youtube.com/embed/${videoId}`;
            } else if (videoUrl.includes('watch?v=')) {
                const videoId = videoUrl.split('v=')[1].split('&')[0];
                embedUrl = `https://www.youtube.com/embed/${videoId}`;
            } else if (videoUrl.includes('youtube.com/embed')) {
                embedUrl = videoUrl;
            }
            
            videoIframe.src = embedUrl;
            videoModal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        };
        
        closeModal.addEventListener('click', () => {
            videoModal.style.display = 'none';
            videoIframe.src = '';
            document.body.style.overflow = 'auto';
        });
        
        window.addEventListener('click', (e) => {
            if (e.target === videoModal) {
                videoModal.style.display = 'none';
                videoIframe.src = '';
                document.body.style.overflow = 'auto';
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && videoModal.style.display === 'block') {
                videoModal.style.display = 'none';
                videoIframe.src = '';
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>
