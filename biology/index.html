<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Cell | Biology Course Map</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES (Biology Deep Teal & Organic Green) --- */
        :root {
            --bg-deep: #0A2F2A;      /* Deep teal - represents ocean/depth of life */
            --bg-surface: #123B35;    /* Slightly lighter teal */
            --primary: #2A9D8F;       /* Teal green - represents life/chlorophyll */
            --accent: #E9C46A;         /* Warm yellow - represents energy/sunlight */
            --text-main: #FFFFFF;
            --text-muted: #A8D5C5;     /* Soft mint for muted text */
            --border: rgba(42, 157, 143, 0.25); /* Teal-tinted border */
            --card-hover: rgba(42, 157, 143, 0.15);
            --font: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font);
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        /* --- BACKGROUND EFFECTS --- */
        .glow-orb {
            position: fixed; width: 400px; height: 400px;
            background: var(--primary); filter: blur(150px); opacity: 0.12;
            border-radius: 50%; z-index: -1; pointer-events: none;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; background: var(--accent); opacity: 0.1; }

        /* Cell Pattern Overlay (subtle - represents cellular structure) */
        .pattern-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 20px 20px, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.15;
        }

        /* --- HEADER --- */
        header {
            padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 47, 42, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }

        .brand { 
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; 
        }
        .brand span { color: var(--accent); }
        .brand-icon { 
            width: 32px; height: 32px; background: var(--accent); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            color: var(--bg-deep); font-weight: bold;
        }

        .user-pill {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 50px; border: 1px solid var(--border);
        }
        .user-avatar { 
            width: 28px; height: 28px; background: var(--accent); border-radius: 50%; 
            display:flex; align-items:center; justify-content:center; font-size:0.8rem; 
            font-weight:bold; color:var(--bg-deep);
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 2rem;
            text-align: center;
            max-width: 800px; margin: 0 auto;
        }

        .hero h1 { 
            font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; 
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .hero p { color: var(--text-muted); margin-bottom: 2rem; }

        /* --- GRID LAYOUT --- */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            padding: 0 1.5rem 4rem 1.5rem;
            max-width: 1200px; margin: 0 auto;
        }

        /* --- MODULE CARD --- */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.2rem;
            display: flex; flex-direction: column; justify-content: space-between;
            aspect-ratio: 1 / 1.1;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
            cursor: pointer;
            position: relative; overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            background: linear-gradient(145deg, var(--bg-surface), var(--card-hover));
            border-color: var(--accent);
        }

        /* Card Visuals */
        .card-top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
        .card-num { 
            font-size: 0.75rem; 
            color: var(--accent); 
            font-weight: 700; 
            opacity: 0.9;
            letter-spacing: 0.5px;
        }
        .card-icon { font-size: 1.8rem; }
        
        .card-title {
            font-size: 1rem; font-weight: 700; line-height: 1.3; margin-bottom: auto;
            color: #E2E8F0;
        }

        .card-footer {
            margin-top: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-dot { 
            width: 8px; height: 8px; border-radius: 50%; 
            background: var(--bg-deep); 
            border: 1px solid var(--border); 
        }
        .status-dot.done { 
            background: var(--accent); 
            border-color: var(--accent); 
            box-shadow: 0 0 8px var(--accent); 
        }
        
        .arrow-btn { 
            width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: center; color: var(--text-muted);
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .card:hover .arrow-btn { background: var(--accent); color: var(--bg-deep); }

        /* Section Header */
        .section-header {
            grid-column: 1 / -1;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
        }
        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            width: 100px;
            margin-top: 4px;
        }

        /* --- RESPONSIVE --- */
        @media (min-width: 768px) {
            .module-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }
            .card { aspect-ratio: 1.5 / 1; }
            .hero h1 { font-size: 3rem; }
            .hero-subtitle { font-size: 1.3rem; }
        }

    </style>
</head>
<body>

    <!-- Backgrounds -->
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
    <div class="pattern-overlay"></div>

    <!-- Header -->
    <header>
        <div class="brand">
            <div class="brand-icon">🧬</div>
            <span>The</span> Cell
        </div>
        <div class="user-pill">
            <span style="font-size:0.8rem; color:var(--text-muted);">Biologist</span>
            <div class="user-avatar">B</div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="hero">
            <h1>Biology</h1>
            <div class="hero-subtitle">LIFE • FORM • FUNCTION • ECOLOGY • HEREDITY</div>
            <p>Master the science of life for JAMB/WAEC/NECO success.</p>
        </div>

        <!-- The Grid -->
        <div class="module-grid" id="gridContainer">
            <!-- Cards injected via JS -->
        </div>
    </main>

    <script>
        // === 1. DATA CONFIGURATION ===
        // Biology Syllabus mapped to folders (based on your syllabus structure)
        const modules = [
            // PART A: VARIETY OF ORGANISMS
            { id: 1, section: "A", folder: "01_LivingOrganisms", title: "Living Organisms", icon: "🔬" },
            { id: 2, section: "A", folder: "02_CellStructure", title: "Cell Structure & Function", icon: "🧫" },
            { id: 3, section: "A", folder: "03_LevelsOrganization", title: "Levels of Organization", icon: "📊" },
            { id: 4, section: "A", folder: "04_Monera", title: "Monera (Bacteria & Blue-green Algae)", icon: "🦠" },
            { id: 5, section: "A", folder: "05_Protista", title: "Protista (Amoeba, Euglena)", icon: "🦠" },
            { id: 6, section: "A", folder: "06_Fungi", title: "Fungi (Mushroom, Rhizopus)", icon: "🍄" },
            { id: 7, section: "A", folder: "07_PlantaeThallophyta", title: "Plantae: Thallophyta (Spirogyra)", icon: "🌿" },
            { id: 8, section: "A", folder: "08_PlantaeBryophyta", title: "Plantae: Bryophyta (Mosses)", icon: "🌱" },
            { id: 9, section: "A", folder: "09_PlantaePteridophyta", title: "Plantae: Pteridophyta (Ferns)", icon: "🍃" },
            { id: 10, section: "A", folder: "10_PlantaeSpermatophyta", title: "Plantae: Spermatophyta", icon: "🌳" },
            { id: 11, section: "A", folder: "11_AnimaliaInvertebrates", title: "Animalia: Invertebrates", icon: "🐛" },
            { id: 12, section: "A", folder: "12_AnimaliaVertebrates", title: "Animalia: Vertebrates", icon: "🐟" },
            { id: 13, section: "A", folder: "13_Adaptations", title: "Adaptations of Organisms", icon: "🦎" },

            // PART B: FORMS AND FUNCTIONS
            { id: 14, section: "B", folder: "14_InternalStructurePlants", title: "Internal Structure of Plants", icon: "🌿" },
            { id: 15, section: "B", folder: "15_InternalStructureMammal", title: "Internal Structure of Mammals", icon: "🧠" },
            { id: 16, section: "B", folder: "16_NutritionModes", title: "Modes of Nutrition", icon: "🍽️" },
            { id: 17, section: "B", folder: "17_PlantNutrition", title: "Plant Nutrition", icon: "☀️" },
            { id: 18, section: "B", folder: "18_AnimalNutrition", title: "Animal Nutrition", icon: "🍖" },
            { id: 19, section: "B", folder: "19_Transport", title: "Transport Systems", icon: "💓" },
            { id: 20, section: "B", folder: "20_Respiration", title: "Respiration", icon: "🌬️" },
            { id: 21, section: "B", folder: "21_Excretion", title: "Excretion", icon: "🚰" },
            { id: 22, section: "B", folder: "22_SupportMovement", title: "Support & Movement", icon: "🦴" },
            { id: 23, section: "B", folder: "23_ReproductionAsexual", title: "Asexual Reproduction", icon: "🔄" },
            { id: 24, section: "B", folder: "24_ReproductionPlants", title: "Sexual Reproduction in Plants", icon: "🌸" },
            { id: 25, section: "B", folder: "25_ReproductionMammals", title: "Reproduction in Mammals", icon: "👶" },
            { id: 26, section: "B", folder: "26_Growth", title: "Growth", icon: "📈" },
            { id: 27, section: "B", folder: "27_CoordinationNervous", title: "Nervous Coordination", icon: "⚡" },
            { id: 28, section: "B", folder: "28_SenseOrgans", title: "Sense Organs", icon: "👁️" },
            { id: 29, section: "B", folder: "29_HormonalControl", title: "Hormonal Control", icon: "🧪" },
            { id: 30, section: "B", folder: "30_Homeostasis", title: "Homeostasis", icon: "⚖️" },

            // PART C: ECOLOGY
            { id: 31, section: "C", folder: "31_FactorsDistribution", title: "Factors Affecting Distribution", icon: "🌍" },
            { id: 32, section: "C", folder: "32_SymbioticInteractions", title: "Symbiotic Interactions", icon: "🤝" },
            { id: 33, section: "C", folder: "33_EnergyFlow", title: "Energy Flow (Food Chains/Webs)", icon: "⚡" },
            { id: 34, section: "C", folder: "34_NutrientCycling", title: "Nutrient Cycling", icon: "🔄" },
            { id: 35, section: "C", folder: "35_NaturalHabitats", title: "Natural Habitats", icon: "🏞️" },
            { id: 36, section: "C", folder: "36_NigerianBiomes", title: "Local (Nigerian) Biomes", icon: "🌴" },
            { id: 37, section: "C", folder: "37_PopulationEcology", title: "Ecology of Populations", icon: "📊" },
            { id: 38, section: "C", folder: "38_AdaptationSurvival", title: "Adaptation for Survival", icon: "🦁" },
            { id: 39, section: "C", folder: "39_EcologicalSuccession", title: "Ecological Succession", icon: "🌱" },
            { id: 40, section: "C", folder: "40_SoilCharacteristics", title: "Soil Characteristics", icon: "🪨" },
            { id: 41, section: "C", folder: "41_SoilComponents", title: "Components of Soil", icon: "🧪" },
            { id: 42, section: "C", folder: "42_SoilFertility", title: "Soil Fertility", icon: "🌿" },
            { id: 43, section: "C", folder: "43_HumansEnvironment", title: "Humans and Environment", icon: "🏙️" },
            { id: 44, section: "C", folder: "44_Diseases", title: "Diseases", icon: "🦠" },
            { id: 45, section: "C", folder: "45_DrugAbuse", title: "Drug Abuse", icon: "💊" },
            { id: 46, section: "C", folder: "46_Pollution", title: "Pollution & Control", icon: "🏭" },
            { id: 47, section: "C", folder: "47_Conservation", title: "Conservation", icon: "🌳" },

            // PART D: HEREDITY AND VARIATIONS
            { id: 48, section: "D", folder: "48_Variation", title: "Variation in Population", icon: "👥" },
            { id: 49, section: "D", folder: "49_Heredity", title: "Heredity", icon: "🧬" },
            { id: 50, section: "D", folder: "50_GeneticsProbability", title: "Genetics & Probability", icon: "🎲" },
            { id: 51, section: "D", folder: "51_ApplicationsHeredity", title: "Applications of Heredity", icon: "🌾" },
            { id: 52, section: "D", folder: "52_SexLinked", title: "Sex-Linked Characters", icon: "⚤" },
            { id: 53, section: "D", folder: "53_Biotechnology", title: "Biotechnology", icon: "🧪" },

            // PART E: EVOLUTION
            { id: 54, section: "E", folder: "54_TheoriesEvolution", title: "Theories of Evolution", icon: "📚" },
            { id: 55, section: "E", folder: "55_EvidenceEvolution", title: "Evidence of Evolution", icon: "🦴" }
        ];

        const grid = document.getElementById('gridContainer');

        // === 2. RENDER FUNCTION WITH SECTION HEADERS ===
        function renderModules() {
            grid.innerHTML = '';
            
            // Group by section
            const sections = {
                'A': 'PART A: Variety of Organisms',
                'B': 'PART B: Forms and Functions',
                'C': 'PART C: Ecology',
                'D': 'PART D: Heredity and Variations',
                'E': 'PART E: Evolution'
            };
            
            // For each section, add header and cards
            ['A', 'B', 'C', 'D', 'E'].forEach(sectionCode => {
                const sectionModules = modules.filter(m => m.section === sectionCode);
                
                if (sectionModules.length > 0) {
                    // Add section header
                    const headerDiv = document.createElement('div');
                    headerDiv.className = 'section-header';
                    headerDiv.innerHTML = `
                        <div class="section-title">${sections[sectionCode]}</div>
                        <div class="section-divider"></div>
                    `;
                    grid.appendChild(headerDiv);
                    
                    // Add cards for this section
                    sectionModules.forEach(mod => {
                        const link = `./${mod.folder}/index.html`;
                        
                        // Random progress for demo - in real app, this would come from user data
                        const isCompleted = [1, 2, 11, 14, 17, 19, 20, 23, 31, 48, 49, 54].includes(mod.id); 
                        const dotClass = isCompleted ? 'status-dot done' : 'status-dot';

                        const card = document.createElement('a');
                        card.href = link;
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-top">
                                <span class="card-num">${mod.id.toString().padStart(2, '0')}</span>
                                <span class="card-icon">${mod.icon}</span>
                            </div>
                            <div class="card-title">${mod.title}</div>
                            <div class="card-footer">
                                <div class="${dotClass}"></div>
                                <div class="arrow-btn">➜</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            });
        }

        // Initial Load
        renderModules();

    </script>
</body>
</html>
