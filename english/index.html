<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Use of English | JAMB UTME</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* --- THEME VARIABLES (Original High School Theme) --- */
        :root {
            --bg-deep: #0B0F19;
            --bg-surface: #151B2B;
            --primary: #6366F1;       /* Indigo */
            --accent: #10B981;        /* Emerald */
            --text-main: #FFFFFF;
            --text-muted: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
            --card-hover: rgba(99, 102, 241, 0.1);
            --font: 'Plus Jakarta Sans', sans-serif;
        }

        /* --- RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font);
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        /* --- BACKGROUND EFFECTS --- */
        .glow-orb {
            position: fixed; width: 400px; height: 400px;
            background: var(--primary); filter: blur(150px); opacity: 0.15;
            border-radius: 50%; z-index: -1; pointer-events: none;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; background: var(--accent); }

        /* --- HEADER --- */
        header {
            padding: 1.5rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }

        .brand { 
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; 
        }
        .brand span { color: var(--primary); }
        .brand-icon { 
            width: 32px; height: 32px; background: var(--primary); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            color: white;
        }

        .user-pill {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 50px; border: 1px solid var(--border);
        }
        .user-avatar { 
            width: 28px; height: 28px; background: var(--accent); border-radius: 50%; 
            display:flex; align-items:center; justify-content:center; font-size:0.8rem; 
            font-weight:bold; color:black;
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 2rem;
            text-align: center;
            max-width: 800px; margin: 0 auto;
        }
        .hero h1 { 
            font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; 
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p { color: var(--text-muted); margin-bottom: 2rem; }

        /* --- GRID LAYOUT --- */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
            padding: 0 1.5rem 4rem 1.5rem;
            max-width: 1200px; margin: 0 auto;
        }

        /* --- MODULE CARD --- */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.2rem;
            display: flex; flex-direction: column;
            min-height: 160px;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
            position: relative; overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            background: linear-gradient(145deg, var(--bg-surface), var(--card-hover));
            border-color: var(--primary);
        }

        /* Card Visuals */
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .card-num { 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            font-weight: 600; 
            opacity: 0.7;
            white-space: nowrap;
        }
        .card-icon { font-size: 1.8rem; flex-shrink: 0; margin-left: 5px; }
        
        .card-title {
            font-size: 0.95rem; 
            font-weight: 700; 
            line-height: 1.4; 
            color: #E2E8F0;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            margin-bottom: auto;
            flex: 1;
        }

        .card-footer {
            margin-top: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-dot { 
            width: 8px; height: 8px; border-radius: 50%; 
            background: var(--bg-deep); 
            border: 1px solid var(--border); 
        }
        .status-dot.done { 
            background: var(--accent); 
            border-color: var(--accent); 
            box-shadow: 0 0 8px var(--accent); 
        }
        
        .arrow-btn { 
            width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.05); 
            display: flex; align-items: center; justify-content: center; color: var(--text-muted);
            font-size: 0.8rem;
        }
        .card:hover .arrow-btn { background: var(--primary); color: white; }

        /* Section Header */
        .section-header {
            grid-column: 1 / -1;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
            width: 100px;
            margin-top: 4px;
        }

        /* --- RESPONSIVE --- */
        @media (min-width: 768px) {
            .module-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
            .card { min-height: 170px; }
            .hero h1 { font-size: 3rem; }
        }

        /* For very small screens */
        @media (max-width: 480px) {
            .module-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .card-title { font-size: 0.9rem; }
            .card-icon { font-size: 1.5rem; }
        }

    </style>
</head>
<body>

    <!-- Backgrounds -->
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>

    <!-- Header -->
    <header>
        <div class="brand">
            <div class="brand-icon">📚</div>
            Use of <span>English</span>
        </div>
        <div class="user-pill">
            <span style="font-size:0.8rem; color:var(--text-muted);">JAMB Candidate</span>
            <div class="user-avatar">UT</div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="hero">
            <h1>Use of English</h1>
            <p>Master comprehension, lexis, structure and oral English for JAMB success.</p>
        </div>

        <!-- The Grid -->
        <div class="module-grid" id="gridContainer">
            <!-- Cards injected via JS -->
        </div>
    </main>

    <script>
        // === 1. DATA CONFIGURATION ===
        // Use of English Syllabus mapped to folders
        const modules = [
            // SECTION A: Comprehension & Summary
            { id: 1, section: "A", folder: "01_Lekki_Headmaster", title: "The Lekki Headmaster", icon: "📖" },
            { id: 2, section: "A", folder: "02_Descriptive_Passages", title: "Descriptive Passages", icon: "✍️" },
            { id: 3, section: "A", folder: "03_Narrative_Passages", title: "Narrative Passages", icon: "📚" },
            { id: 4, section: "A", folder: "04_Expository_Passages", title: "Expository Passages", icon: "📝" },
            { id: 5, section: "A", folder: "05_Argumentative_Passages", title: "Argumentative/ Persuasive", icon: "⚖️" },
            { id: 6, section: "A", folder: "06_Cloze_Passages", title: "Cloze Passages", icon: "🔍" },
            { id: 7, section: "A", folder: "07_Summary_Writing", title: "Summary Writing", icon: "📊" },
            
            // SECTION B: Lexis & Structure
            { id: 8, section: "B", folder: "08_Synonyms", title: "Synonyms", icon: "🔄" },
            { id: 9, section: "B", folder: "09_Antonyms", title: "Antonyms", icon: "⚡" },
            { id: 10, section: "B", folder: "10_Clause_Patterns", title: "Clause & Sentence Patterns", icon: "📐" },
            { id: 11, section: "B", folder: "11_Word_Classes", title: "Word Classes & Functions", icon: "📚" },
            { id: 12, section: "B", folder: "12_Tense_Aspect", title: "Mood, Tense & Aspect", icon: "⏰" },
            { id: 13, section: "B", folder: "13_Agreement", title: "Number & Agreement/Concord", icon: "✓" },
            { id: 14, section: "B", folder: "14_Degrees", title: "Degrees of Comparison", icon: "📈" },
            { id: 15, section: "B", folder: "15_Question_Tags", title: "Question Tags", icon: "❓" },
            { id: 16, section: "B", folder: "16_Mechanics", title: "Mechanics (Punctuation)", icon: "✏️" },
            { id: 17, section: "B", folder: "17_Ordinary_Usage", title: "Ordinary Usage", icon: "💬" },
            { id: 18, section: "B", folder: "18_Figurative_Usage", title: "Figurative Usage", icon: "🎨" },
            { id: 19, section: "B", folder: "19_Idiomatic_Usage", title: "Idiomatic Usage", icon: "🔤" },
            
            // SECTION C: Oral English
            { id: 20, section: "C", folder: "20_Monophthongs", title: "Vowels: Monophthongs", icon: "🔊" },
            { id: 21, section: "C", folder: "21_Diphthongs", title: "Vowels: Diphthongs", icon: "🔊" },
            { id: 22, section: "C", folder: "22_Triphthongs", title: "Vowels: Triphthongs", icon: "🔊" },
            { id: 23, section: "C", folder: "23_Consonants", title: "Consonants", icon: "🔉" },
            { id: 24, section: "C", folder: "24_Consonant_Clusters", title: "Consonant Clusters", icon: "🔉" },
            { id: 25, section: "C", folder: "25_Rhymes_Homophones", title: "Rhymes & Homophones", icon: "🎵" },
            { id: 26, section: "C", folder: "26_Word_Stress_Mono", title: "Word Stress: Monosyllabic", icon: "📢" },
            { id: 27, section: "C", folder: "27_Word_Stress_Poly", title: "Word Stress: Polysyllabic", icon: "📢" },
            { id: 28, section: "C", folder: "28_Emphatic_Stress", title: "Emphatic Stress", icon: "❗" }
        ];

        const grid = document.getElementById('gridContainer');

        // === 2. RENDER FUNCTION WITH SECTION HEADERS ===
        function renderModules() {
            grid.innerHTML = '';
            
            // Group by section
            const sections = {
                'A': 'SECTION A: Comprehension & Summary',
                'B': 'SECTION B: Lexis & Structure',
                'C': 'SECTION C: Oral English'
            };
            
            // For each section, add header and cards
            ['A', 'B', 'C'].forEach(sectionCode => {
                const sectionModules = modules.filter(m => m.section === sectionCode);
                
                if (sectionModules.length > 0) {
                    // Add section header
                    const headerDiv = document.createElement('div');
                    headerDiv.className = 'section-header';
                    headerDiv.innerHTML = `
                        <div class="section-title">${sections[sectionCode]}</div>
                        <div class="section-divider"></div>
                    `;
                    grid.appendChild(headerDiv);
                    
                    // Add cards for this section
                    sectionModules.forEach(mod => {
                        const link = `./${mod.folder}/index.html`;
                        
                        // Random progress for demo - in real app, this would come from user data
                        const isCompleted = [1, 2, 8, 9, 12, 20, 23, 26].includes(mod.id); 
                        const dotClass = isCompleted ? 'status-dot done' : 'status-dot';

                        const card = document.createElement('a');
                        card.href = link;
                        card.className = 'card';
                        card.innerHTML = `
                            <div class="card-top">
                                <span class="card-num">${mod.id.toString().padStart(2, '0')}</span>
                                <span class="card-icon">${mod.icon}</span>
                            </div>
                            <div class="card-title">${mod.title}</div>
                            <div class="card-footer">
                                <div class="${dotClass}"></div>
                                <div class="arrow-btn">➜</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            });
        }

        // Initial Load
        renderModules();

    </script>
</body>
</html>
